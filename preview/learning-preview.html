<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning — Vorschau v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14; --surface: #0d1320; --card: #111827; --border: #1e2d45;
    --accent: #00d4ff;          /* Cyan (Primär, wie Hauptseite) */
    --blue:   #2f6fed;          /* sattes, klares Blau — kein Violett */
    --text: #e8f0fe; --muted: #8094b3;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.1rem 2rem; display: flex; justify-content: space-between; align-items: center;
    background: rgba(8,12,20,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--font-display); font-size: 1rem; font-weight: 800; color: var(--accent); letter-spacing: 0.04em; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-back { color: var(--accent); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.08em; padding: 0.4rem 0.9rem; border: 1px solid rgba(0,212,255,0.25); border-radius: 6px; }
  .lang-switcher { display: flex; gap: 0.3rem; }
  .lang-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; padding: 0.25rem 0.5rem; font-family: var(--font-body); font-size: 0.7rem; font-weight: 600; cursor: pointer; }
  .lang-btn.active { color: var(--accent); border-color: rgba(0,212,255,0.5); }

  .wrap { max-width: 820px; margin: 0 auto; padding: 7rem 1.5rem 5rem; }
  .badge { display: inline-block; color: var(--accent); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.8rem; }
  h1 { font-family: var(--font-display); font-size: 2.6rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.1; }
  .sub { color: var(--muted); font-size: 1.02rem; max-width: 620px; margin-bottom: 2.5rem; }

  /* Kategorie */
  .cat { margin-bottom: 2.5rem; }
  .cat-head { display: flex; align-items: baseline; gap: 0.7rem; padding-bottom: 0.7rem; margin-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .cat-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; }
  .cat-count { color: var(--muted); font-size: 0.85rem; }

  /* Inhaltsverzeichnis-Eintrag (aufklappbar) */
  .item { border-bottom: 1px solid rgba(30,45,69,0.6); }
  .item-head { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 0.2rem; cursor: pointer; transition: color 0.15s; }
  .item-head:hover { color: var(--accent); }
  .chevron { flex-shrink: 0; color: var(--blue); transition: transform 0.2s; font-size: 0.9rem; }
  .item.open .chevron { transform: rotate(90deg); }
  .item-title { flex: 1; font-size: 1.02rem; font-weight: 600; }
  .item-meta { color: var(--muted); font-size: 0.8rem; }

  .item-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .item.open .item-body { max-height: 1500px; }
  .item-inner { padding: 0.2rem 0.2rem 1.6rem 2.4rem; }
  .item-lead { color: var(--muted); margin-bottom: 1.2rem; }

  .step { display: flex; gap: 0.9rem; padding: 0.55rem 0; }
  .step-n { flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px; background: var(--blue); color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; }
  .step-t { font-weight: 600; }
  .step-d { color: var(--muted); font-size: 0.9rem; }

  /* Tool-Tabelle (für 'Tools with Claude Code') */
  .tooltbl { width: 100%; border-collapse: collapse; margin-top: 0.4rem; font-size: 0.9rem; }
  .tooltbl td { padding: 0.5rem 0.6rem; border-bottom: 1px solid rgba(30,45,69,0.6); vertical-align: top; }
  .tooltbl td:first-child { color: var(--accent); font-weight: 600; white-space: nowrap; width: 130px; }
  .tooltbl td:last-child { color: var(--muted); }

  .takeaway { margin-top: 1.3rem; padding: 0.9rem 1.1rem; background: rgba(47,111,237,0.1); border-left: 3px solid var(--blue); border-radius: 6px; font-size: 0.92rem; }
  .takeaway b { color: var(--blue); }
  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1.1rem; }
  .tag { font-size: 0.68rem; color: var(--accent); background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); border-radius: 20px; padding: 0.2rem 0.7rem; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">[ NLC ] learning</a>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn active" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
    <a href="/" class="nav-back">← back to nlc</a>
  </div>
</nav>

<div class="wrap">
  <div class="badge">// learning</div>
  <h1 id="page-title">Learning</h1>
  <p class="sub" id="page-sub"></p>
  <div id="cats"></div>
</div>

<script>

    cats: [

          lead: "300 kuratierte RSS-Feeds + ein Master-Prompt für tägliche, globale KI-Nachrichten.",
          steps: [
            ["Einfügen","Master-Prompt zuerst, darunter die RSS-Liste — in Claude, n8n o.ä."],

          tags: ["Claude Code","Tools"] },
        { title: "Claude Code — Setup, Hooks & MCP", meta: "Kurs-Überblick",
          lead: "Roter Faden des Anthropic-Kurses „Claude Code in Action“.",
          steps: [
            ["Setup","Claude Code installieren, Projekt einrichten, Kontext hinzufügen."],
            ["Arbeiten","Änderungen machen, Kontext steuern, Custom Commands."],
            ["Hooks","Hooks definieren & implementieren — Automatik an den richtigen Stellen."],
            ["MCP & SDK","MCP-Server anbinden, GitHub-Integration, das Claude Code SDK."]
          ],
          takeaway: "Vom ersten Setup bis zu eigenen Hooks & MCP-Servern — Claude Code wächst mit.",

      ]},
      { name: "n8n", items: [

          tags: ["n8n","Claude","RAG"] }
      ]}
    ]
  },
  en: {
    title: "Learning",

      { name: "AI News & Automation", items: [
        { title: "Global AI News RSS System", meta: "Free · Daily",
          lead: "300 curated RSS feeds + a master prompt for daily global AI news.",
          steps: [
            ["Paste","Master prompt first, RSS list below — into Claude, n8n etc."],

      ]},
      { name: "Claude Code", items: [

          lead: "The core built-in tools Claude Code uses to get work done.",

          ],

          tags: ["Claude Code","Tools"] },
        { title: "Claude Code — Setup, Hooks & MCP", meta: "Course overview",
          lead: "The thread of Anthropic's course “Claude Code in Action”.",
          steps: [
            ["Setup","Install Claude Code, set up the project, add context."],
            ["Working","Make changes, control context, custom commands."],

          ],
          takeaway: "From first setup to custom hooks & MCP servers — Claude Code grows with you.",
          tags: ["Claude Code","Hooks","MCP"] }
      ]},
      { name: "n8n", items: [
        { title: "AI Chatbot — Zero Code with n8n", meta: "Free · 30 min",
          lead: "Build your own RAG chatbot in 7 steps, no code at all.",
          steps: [
            ["Install n8n","Docker or cloud — ready in 5 minutes."],
            ["Chat Trigger","The entry point for all messages."],
            ["Connect LLM","Hook up OpenAI, Claude or Gemini."],
            ["Knowledge Base","Connect your docs via RAG."],
            ["Memory","So it remembers the conversation."],
            ["Tools","Add web search, email, calendar."],
            ["Go Live","Embed on your site or connect to WhatsApp."]
          ],
          takeaway: "A working RAG chatbot in ~30 minutes — fully no-code.",
          tags: ["n8n","Claude","RAG"] }
      ]}
    ]
  }
};

let lang = "de";
const cats = document.getElementById("cats");

function bodyHTML(it){
  let inner = `<div class="item-lead">${it.lead}</div>`;
  if (it.steps) inner += it.steps.map((s,i)=>`<div class="step"><div class="step-n">${i+1}</div><div><div class="step-t">${s[0]}</div><div class="step-d">${s[1]}</div></div></div>`).join("");
  if (it.table) inner += `<table class="tooltbl">${it.table.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("")}</table>`;
  inner += `<div class="takeaway"><b>Key Takeaway · </b>${it.takeaway}</div>`;
  inner += `<div class="tags">${it.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`;
  return `<div class="item-inner">${inner}</div>`;
}

function render(){
  const d = DATA[lang] || DATA.de;
  document.getElementById("page-title").textContent = d.title;
  document.getElementById("page-sub").textContent = d.sub;
  cats.innerHTML = d.cats.map(c => `
    <div class="cat">
      <div class="cat-head"><span class="cat-title">${c.name}</span><span class="cat-count">${c.items.length} ${lang==='de'?'Einträge':'entries'}</span></div>
      ${c.items.map(it => `
        <div class="item">
          <div class="item-head"><span class="chevron">▶</span><span class="item-title">${it.title}</span><span class="item-meta">${it.meta}</span></div>
          <div class="item-body">${bodyHTML(it)}</div>
        </div>`).join("")}
    </div>`).join("");
  cats.querySelectorAll(".item-head").forEach(h => h.addEventListener("click", () => h.parentElement.classList.toggle("open")));
}

document.querySelectorAll(".lang-btn").forEach(b => b.addEventListener("click", () => {
  lang = (b.dataset.lang === "en") ? "en" : (DATA[b.dataset.lang] ? b.dataset.lang : "de");
  document.querySelectorAll(".lang-btn").forEach(x => x.classList.toggle("active", x === b));
  render();
}));

render();
</script>
</body>
</html>
