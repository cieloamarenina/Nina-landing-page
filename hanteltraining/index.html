<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanteltraining — Nina</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1320'/><text x='2' y='22' font-family='monospace' font-weight='bold' font-size='13' fill='%2300d4ff'>NLC</text></svg>">
<style>
  :root {
    --bg: #0A1628;
    --bg-card: #142640;
    --bg-elevated: #1B3252;
    --blue: #3B82F6;
    --blue-bright: #60A5FA;
    --accent: #38BDF8;
    --warm: #F59E0B;
    --text: #F8FAFC;
    --muted: #94A3B8;
    --border: #1E3A5F;
    --success: #10B981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(59, 130, 246, 0.15), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(56, 189, 248, 0.1), transparent 50%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.5;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 32px 20px 16px;
  }

  h1 {
    font-family: Arial, sans-serif;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -1.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .progress-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin: 24px 0;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }

  .progress-label span:last-child { color: var(--accent); }

  .progress-bar {
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--accent));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .workout-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 18px 0 22px;
    flex-wrap: wrap;
  }
  .ws-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    transition: all 0.2s;
  }
  .ws-btn:hover { background: var(--bg-elevated); color: var(--text); border-color: var(--accent); }
  .ws-btn.active {
    background: linear-gradient(135deg, var(--blue), var(--accent));
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(56,189,248,0.35);
  }
  .ws-btn .ws-icon { font-size: 16px; }

  .phases {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .phase-tab {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 14px 8px;
    border-radius: 10px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s ease;
  }

  .phase-tab:hover {
    border-color: var(--blue);
    color: var(--text);
    transform: translateY(-1px);
  }

  .phase-tab.active {
    background: linear-gradient(135deg, var(--blue), var(--accent));
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
  }

  .phase-tab .num {
    display: block;
    font-size: 10px;
    opacity: 0.7;
    margin-bottom: 4px;
    font-weight: 700;
  }

  .phase-header {
    margin-bottom: 20px;
    padding: 24px 28px;
    background: var(--bg-card);
    border-radius: 16px;
    border-left: 4px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .phase-title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }

  .phase-meta {
    color: var(--muted);
    font-size: 13px;
  }

  .phase-meta .rounds {
    color: var(--warm);
    font-weight: 800;
    background: rgba(245, 158, 11, 0.15);
    padding: 4px 10px;
    border-radius: 6px;
    margin-left: 4px;
  }

  .exercises {
    display: grid;
    gap: 16px;
  }

  .exercise-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 22px;
    transition: all 0.3s ease;
  }

  @media (max-width: 600px) {
    .exercise-card {
      grid-template-columns: 1fr;
    }
    .phases {
      grid-template-columns: repeat(2, 1fr);
    }
    h1 { font-size: 32px; }
  }

  .exercise-card:hover {
    border-color: var(--blue);
  }

  .exercise-card.completed {
    border-color: var(--success);
  }

  .animation-box {
    background: var(--bg-elevated);
    border-radius: 12px;
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .animation-box::before {
    content: '';
    position: absolute;
    bottom: 25px;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .exercise-info h3 {
    font-size: 19px;
    font-weight: 800;
    margin-bottom: 10px;
    letter-spacing: -0.3px;
  }

  .exercise-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .meta-item {
    background: var(--bg-elevated);
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .meta-item.weight {
    color: var(--warm);
    background: rgba(245, 158, 11, 0.12);
  }

  .description {
    color: var(--muted);
    font-size: 13.5px;
    margin-bottom: 14px;
    line-height: 1.55;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .set-tracker {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .set-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }

  .set-dots {
    display: flex;
    gap: 6px;
  }

  .set-dot {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px dashed var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: Arial;
    font-weight: 800;
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .set-dot:hover {
    border-color: var(--blue);
    border-style: solid;
    background: rgba(56,189,248,0.08);
    transform: scale(1.1);
  }

  .set-dot.done {
    background: var(--success);
    border-color: var(--success);
    border-style: solid;
    color: white;
  }

  .timer-btn {
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: Arial;
    font-weight: 800;
    font-size: 12px;
    margin-left: auto;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .timer-btn:hover {
    background: var(--blue);
    color: white;
  }

  .timer-btn.running {
    background: var(--warm);
    border-color: var(--warm);
    color: white;
    animation: pulse 1s infinite;
  }

  .hold-btn {
    border-color: var(--success);
    color: var(--success);
    margin-left: auto;
  }
  .hold-btn:hover { background: var(--success); color: white; }
  .hold-btn + .timer-btn { margin-left: 8px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Stickman SVG styles */
  .stickman { width: 120px; height: 140px; }
  .stickman .body { stroke: var(--accent); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .stickman .head { fill: var(--accent); stroke: var(--accent); }
  .stickman .bench { stroke: var(--muted); stroke-width: 4; fill: none; }
  .stickman .weight { stroke: var(--warm); stroke-width: 4; fill: var(--warm); }
  .stickman .ground { stroke: var(--border); stroke-width: 1; stroke-dasharray: 3,3; }

  .footer-msg {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 32px 20px 20px;
    letter-spacing: 0.5px;
  }

  .footer-msg .pablo {
    color: var(--warm);
    font-weight: 700;
  }

  /* Reset button */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: Arial;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--warm);
    color: var(--warm);
  }

  /* Header action buttons */
  .header-actions {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: Arial;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .action-btn.primary {
    background: linear-gradient(135deg, var(--blue), var(--accent));
    color: white;
    border-color: transparent;
  }

  .action-btn.primary:hover {
    opacity: 0.9;
    color: white;
  }

  .action-btn.danger-btn {
    border-color: rgba(245, 158, 11, 0.5);
    color: var(--warm);
  }

  .action-btn.danger-btn:hover {
    background: var(--warm);
    color: white;
    border-color: var(--warm);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 22, 40, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 700px;
    width: 100%;
    padding: 28px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }

  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    font-family: Arial;
  }

  .modal-close:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  @media (max-width: 500px) {
    .stats-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .stat-card {
    background: var(--bg-elevated);
    padding: 16px 10px;
    border-radius: 12px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .stat-value {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--warm));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }

  /* History list */
  .history-title {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .history-list {
    display: grid;
    gap: 10px;
    max-height: 400px;
    overflow-y: auto;
  }

  .history-item {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .history-date {
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .history-stats {
    color: var(--muted);
    font-size: 12px;
  }

  .history-note {
    color: var(--text);
    font-size: 13px;
    font-style: italic;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .history-badge {
    background: var(--success);
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 800;
    white-space: nowrap;
  }

  .history-badge.partial {
    background: var(--warm);
  }

  .history-empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 20px;
    line-height: 1.6;
  }

  /* Notes textarea */
  .notes-input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: Arial;
    font-size: 14px;
    padding: 12px 14px;
    margin-bottom: 16px;
    resize: vertical;
    min-height: 70px;
  }

  .notes-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .save-btn {
    background: linear-gradient(135deg, var(--blue), var(--accent));
    color: white;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-family: Arial;
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 100%;
  }

  .save-btn:hover { opacity: 0.92; }

  .confirm-text {
    color: var(--text);
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .confirm-text strong { color: var(--accent); }

  .confirm-buttons {
    display: flex;
    gap: 10px;
  }

  .confirm-buttons .action-btn {
    flex: 1;
    padding: 12px 16px;
  }

  /* Toast banner */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: linear-gradient(135deg, var(--success), #059669);
    padding: 14px 22px;
    border-radius: 14px;
    color: white;
    font-weight: 800;
    font-size: 14px;
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s ease;
    box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Audio toggle (für Timer-Ende) */
  .sound-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    z-index: 100;
  }

  .sound-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── PABLO PLAYER ───────────────────────────── */
  #pablo-player { position: fixed; top: 110px; right: 40px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  #pablo-panel { background: var(--bg-card); border: 1px solid var(--border); width: 300px; border-radius: 4px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); display: none; flex-direction: column; }
  #pablo-panel.open { display: flex; animation: pablo-slide-in 0.25s ease; }
  @keyframes pablo-slide-in { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .pablo-panel-header { padding: 0.6rem 0.9rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); cursor: grab; user-select: none; }
  .pablo-panel-header:active { cursor: grabbing; }
  .pablo-now-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; margin-right: 6px; animation: pablo-live-pulse 2s infinite; }
  .pablo-close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 0; line-height: 1; }
  .pablo-close-btn:hover { color: var(--text); }
  .pablo-playlists { display: flex; gap: 0.35rem; padding: 0.5rem 0.75rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .pl-btn { background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.15); color: var(--muted); border-radius: 999px; padding: 0.4rem 0.75rem; font-size: 0.72rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; min-height: 32px; }
  .pl-btn:hover { background: rgba(56,189,248,0.12); color: var(--text); }
  .pl-btn.active { background: rgba(56,189,248,0.18); border-color: rgba(56,189,248,0.5); color: var(--accent); }

  /* Pablo Player — Mobile-Fixes */
  @media (max-width: 600px) {
    #pablo-player { top: auto; bottom: 14px; right: 14px; left: auto; align-items: flex-end; gap: 0; }
    #pablo-panel { position: fixed; left: 8px; right: 8px; bottom: 100px; width: auto; max-width: none; }
    .pl-btn { padding: 0.55rem 0.9rem; font-size: 0.78rem; min-height: 40px; }
    .pablo-playlists { gap: 0.5rem; padding: 0.7rem 0.75rem; }
    .pablo-photo-wrap, #pablo-photo { width: 80px; height: 80px; }
    .pablo-label { font-size: 0.5rem; margin-top: 2px; }
    #pablo-iframe { width: 100% !important; height: 280px; }
  }
  #pablo-btn { cursor: grab; position: relative; text-align: center; user-select: none; animation: pablo-float 3s ease-in-out infinite; }
  @keyframes pablo-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  #pablo-btn:hover { filter: brightness(1.08); }
  #pablo-btn:active { transform: scale(0.96) translateY(0) !important; }
  .pablo-photo-wrap { position: relative; width: 140px; height: 140px; }
  #pablo-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; object-position: center top; display: block; border: 3px solid var(--border); background: var(--bg-card); }
  .pablo-ring { position: absolute; inset: -4px; border-radius: 50%; border: 2px solid transparent; transition: border-color 0.4s, box-shadow 0.4s; pointer-events: none; }
  .state-playing #pablo-btn { animation: pablo-float-fast 1.2s ease-in-out infinite; }
  .state-playing .pablo-ring { border-color: var(--accent); box-shadow: 0 0 14px rgba(56,189,248,0.55), 0 0 28px rgba(56,189,248,0.25); }
  @keyframes pablo-float-fast { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .state-sleeping #pablo-btn { animation: pablo-breathe 4s ease-in-out infinite; }
  .state-sleeping #pablo-photo { filter: grayscale(0.6) brightness(0.75); }
  @keyframes pablo-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

let currentWorkout = localStorage.getItem('nina_workout_active') || 'vollkoerper';
if (!workouts[currentWorkout]) currentWorkout = 'vollkoerper';
let phases = workouts[currentWorkout].phases;

// ---------- BACKEND: localStorage Persistenz ----------
const STORAGE = {
  current: 'nina_workout_current',
  history: 'nina_workout_history',
  startTime: 'nina_workout_start'
};

function saveCurrent() {
  try {
    localStorage.setItem(STORAGE.current, JSON.stringify(completedSets));
    // Start-Zeit beim ersten Klick setzen
    if (!localStorage.getItem(STORAGE.startTime) && completedCount() > 0) {
      localStorage.setItem(STORAGE.startTime, Date.now().toString());
    }
  } catch(e) { console.warn('Storage save failed', e); }
}

function loadCurrent() {
  try {
    const data = localStorage.getItem(STORAGE.current);
    if (data) completedSets = JSON.parse(data);
  } catch(e) { console.warn('Storage load failed', e); }
}

function getHistory() {
  try {
    const data = localStorage.getItem(STORAGE.history);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

function saveWorkoutSession(note) {
  const history = getHistory();
  const startTime = parseInt(localStorage.getItem(STORAGE.startTime) || Date.now());
  let duration = Math.round((Date.now() - startTime) / 60000);
  if (duration < 1) duration = 1;

  // Pro Phase aggregieren
  const phaseStats = {};
  Object.keys(phases).forEach(phaseKey => {
    let done = 0, total = 0;
    phases[phaseKey].exercises.forEach((ex, idx) => {
      const key = exerciseKey(phaseKey, idx);
      const sets = completedSets[key] || [];
      done += sets.filter(Boolean).length;
      total += ex.sets;
    });
    phaseStats[phaseKey] = { done, total };
  });

  const session = {
    date: new Date().toISOString(),
    workout: currentWorkout,
    duration: duration,
    completed: completedCount(),
    total: totalSets(),
    phases: phaseStats,
    note: (note || '').trim()
  };

  history.unshift(session);
  if (history.length > 50) history.length = 50;
  localStorage.setItem(STORAGE.history, JSON.stringify(history));
}

function startNewWorkout() {
  completedSets = {};
  localStorage.removeItem(STORAGE.current);
  localStorage.removeItem(STORAGE.startTime);
  renderPhase(currentPhase);
}

function computeWeekCount() {
  const history = getHistory();
  if (history.length === 0) return 0;
  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);
  return history.filter(s => new Date(s.date) >= weekAgo).length;
}

// ---------- MODAL: History + Stats ----------
function openHistory() {
  const history = getHistory();
  const weekCount = computeWeekCount();
  const total = history.length;
  const totalMin = history.reduce((sum, s) => sum + (s.duration || 0), 0);

  let html = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">📊 Dein Verlauf</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${weekCount}</div>
          <div class="stat-label">Diese Woche</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalMin}</div>
          <div class="stat-label">Minuten</div>
        </div>
      </div>
      <div class="history-title">Letzte Sessions</div>
      <div class="history-list">
  `;

  if (history.length === 0) {
    html += `<div class="history-empty">Noch keine Workouts gespeichert<br>Mach dein erstes Training und klicke "Workout speichern"</div>`;
  } else {
    html += history.map(s => {
      const d = new Date(s.date);
      const dateStr = d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: '2-digit' });
      const timeStr = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      const completion = Math.round((s.completed / s.total) * 100);
      const badgeClass = completion >= 100 ? '' : 'partial';
      return `
        <div class="history-item">
          <div style="flex:1;min-width:0">
            <div class="history-date">${dateStr} · ${timeStr}</div>
            <div class="history-stats">${s.completed}/${s.total} Sätze · ${s.duration} Min · ${completion}%</div>
            ${s.note ? `<div class="history-note">„${s.note}"</div>` : ''}
          </div>
          <div class="history-badge ${badgeClass}">${completion}%</div>
        </div>
      `;
    }).join('');
  }

  html += `</div></div>`;

  const modal = document.getElementById('modal-backdrop');
  modal.innerHTML = html;
  modal.classList.add('open');
}

function openSaveDialog() {
  const done = completedCount();
  const tot = totalSets();
  if (done === 0) {
    showToast('⚠️ Noch keine Sätze abgehakt');
    return;
  }
  const html = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">💪 Workout speichern</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="confirm-text">
        Speichere dein heutiges Training im Verlauf<br>
        <strong>${done} von ${tot} Sätzen</strong> geschafft
      </div>
      <textarea class="notes-input" id="workout-note" placeholder="Wie war's? (optional) — z.B. fühlte mich stark, Goblet Squat ging easy..."></textarea>
      <button class="save-btn" onclick="confirmSave()">Speichern & neues Workout starten</button>
    </div>
  `;
  const modal = document.getElementById('modal-backdrop');
  modal.innerHTML = html;
  modal.classList.add('open');
}

function openNewWorkoutDialog() {
  if (completedCount() === 0) {
    startNewWorkout();
    showToast('Frisch gestartet — los geht\'s');
    return;
  }
  const html = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">Neues Workout?</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="confirm-text">
        Du hast aktuell <strong>${completedCount()} Sätze</strong> abgehakt<br><br>
        Willst du das aktuelle Workout erst speichern, oder einfach verwerfen?
      </div>
      <div class="confirm-buttons">
        <button class="action-btn primary" onclick="closeModal(); openSaveDialog()">Erst speichern</button>
        <button class="action-btn danger-btn" onclick="discardAndRestart()">Verwerfen</button>
      </div>
    </div>
  `;
  const modal = document.getElementById('modal-backdrop');
  modal.innerHTML = html;
  modal.classList.add('open');
}

function confirmSave() {
  const noteEl = document.getElementById('workout-note');
  const note = noteEl ? noteEl.value : '';
  saveWorkoutSession(note);
  startNewWorkout();
  closeModal();
  showToast('💪 Workout gespeichert — du bist ein Champion');
}

function discardAndRestart() {
  startNewWorkout();
  closeModal();
  showToast('Frisch gestartet');
}

function closeModal() {
  const modal = document.getElementById('modal-backdrop');
  modal.classList.remove('open');
  setTimeout(() => { modal.innerHTML = ''; }, 200);
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2800);
}

function ui(k){ return (UI[lang] && UI[lang][k] != null) ? UI[lang][k] : UI.de[k]; }
function exT(ex){ if(lang==='de') return ex; const t = EXI[lang] && EXI[lang][ex.name]; return t ? Object.assign({}, ex, t) : ex; }
function phT(key, phase){ if(lang==='de') return phase; const t = PHI[lang] && PHI[lang][currentWorkout] && PHI[lang][currentWorkout][key]; return t ? Object.assign({}, phase, t) : phase; }
function applyUI(){
  const u = UI[lang] || UI.de;
  document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (u[k] != null) el.textContent = u[k]; });
  // Subtitle ist workout-abhängig
  const subtitleEl = document.querySelector('.subtitle');
  if (subtitleEl) {
    const subKey = workouts[currentWorkout].subtitleKey;
    if (u[subKey]) subtitleEl.textContent = u[subKey];
  }
  document.documentElement.lang = lang;
  document.querySelectorAll('.ls-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}
function switchLang(l){ lang = l; localStorage.setItem('nina_workout_lang', l); applyUI(); buildPhaseTabs(); renderPhase(currentPhase); }

function updateProgress() {
  const total = totalSets();
  const done = completedCount();
  document.getElementById('progress-text').textContent = `${done} / ${total} ${ui('sets')}`;
  document.getElementById('progress-fill').style.width = `${(done/total)*100}%`;
  if (typeof updateWorkoutClock === 'function') updateWorkoutClock();
}

function exerciseKey(phaseKey, idx) {
  return `${phaseKey}-${idx}`;
}

function renderPhase(phaseKey) {
  const phase = phases[phaseKey];
  const html = `
    <div class="phase-header">
      <div>
        <div class="phase-title">${phT(phaseKey, phase).title}</div>
        <div class="phase-meta">${phT(phaseKey, phase).meta}${phase.rounds > 1 ? ` · <span class="rounds">${phase.rounds} ${ui('rounds')}</span>` : ''}</div>
      </div>
      <button class="reset-btn" onclick="resetPhase('${phaseKey}')">${ui('resetPhase')}</button>
    </div>
    <div class="exercises">
      ${phase.exercises.map((ex, idx) => renderExercise(phaseKey, ex, idx)).join('')}
    </div>
  `;
  document.getElementById('phase-content').innerHTML = html;
  updateProgress();
}

function renderExercise(phaseKey, ex, idx) {
  const key = exerciseKey(phaseKey, idx);
  if (!completedSets[key]) completedSets[key] = new Array(ex.sets).fill(false);
  const allDone = completedSets[key].every(s => s);
  const t = exT(ex);

  const dots = completedSets[key].map((done, i) => `
    <button class="set-dot ${done ? 'done' : ''}" onclick="toggleSet('${phaseKey}', ${idx}, ${i})" title="${ui('tapToCheck')}">
      ${done ? '✓' : i+1}
    </button>
  `).join('');

  const holdSec = holdSeconds(ex);
  let timerHtml = '';
  if (holdSec > 0) {
    const holdId = `hold-${key}`;
    timerSecs[holdId] = holdSec;
    timerHtml += `<button class="timer-btn hold-btn ${countdowns[holdId] ? 'running' : ''}" id="${holdId}" onclick="toggleCountdown('${holdId}', ${holdSec})">${timerLabel(holdId)}</button>`;
  }
  if (ex.pause > 0) {
    const pauseId = `pause-${key}`;
    timerSecs[pauseId] = ex.pause;
    timerHtml += `<button class="timer-btn ${countdowns[pauseId] ? 'running' : ''}" id="${pauseId}" onclick="toggleCountdown('${pauseId}', ${ex.pause})">${timerLabel(pauseId)}</button>`;
  }

  return `
    <div class="exercise-card ${allDone ? 'completed' : ''}">
      <div class="animation-box">${animations[ex.animation] || ''}</div>
      <div class="exercise-info">
        <h3>${t.name}</h3>
        <div class="exercise-meta">
          <span class="meta-item">${t.reps}</span>
          <span class="meta-item weight">${t.weight}</span>
          ${ex.sets > 1 ? `<span class="meta-item">${ex.sets} ${ui('sets')}</span>` : ''}
        </div>
        <div class="description">${t.description}</div>
        <div class="controls">
          <div class="set-tracker">
            <span class="set-label">${ex.sets > 1 ? ui('lblSets') : ui('lblDone')}</span>
            <div class="set-dots">${dots}</div>
          </div>
          ${timerHtml}
        </div>
      </div>
    </div>
  `;
}

function toggleSet(phaseKey, idx, setIdx) {
  const key = exerciseKey(phaseKey, idx);
  const nowDone = !completedSets[key][setIdx];
  completedSets[key][setIdx] = nowDone;
  saveCurrent();
  renderPhase(phaseKey);
  // Pause automatisch starten, wenn ein Satz frisch abgehakt wurde
  const ex = phases[phaseKey].exercises[idx];
  if (nowDone && ex.pause > 0) {
    const pauseId = `pause-${key}`;
    countdowns[pauseId] = { remaining: ex.pause, total: ex.pause };
    refreshTimerBtn(pauseId);
  }
}

function resetPhase(phaseKey) {
  phases[phaseKey].exercises.forEach((_, idx) => {
    const key = exerciseKey(phaseKey, idx);
    completedSets[key] = new Array(phases[phaseKey].exercises[idx].sets).fill(false);
  });
  saveCurrent();
  renderPhase(phaseKey);
}

// ── COUNTDOWN-TIMER (Halte-Zeit + Pause), re-render-sicher ──
// Sekunden aus dem Übungstext lesen (z.B. "30 Sek", "20-30 Sek pro Seite" → 30)
function holdSeconds(ex) {
  if (!/sek/i.test(ex.reps)) return 0;
  const nums = (ex.reps.match(/\d+/g) || []).map(Number);
  return nums.length ? Math.max(...nums) : 0;
}
function timerLabel(id) {
  const c = countdowns[id];
  if (c) return `⏸ ${c.remaining}s`;
  const secs = timerSecs[id] || 0;
  return id.startsWith('hold-') ? `▶ ${secs}s` : `⏱ ${secs}s ${ui('rest')}`;
}
function refreshTimerBtn(id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.textContent = timerLabel(id);
  btn.classList.toggle('running', !!countdowns[id]);
}
function toggleCountdown(id, seconds) {
  if (countdowns[id]) delete countdowns[id];           // läuft → stoppen/zurücksetzen
  else countdowns[id] = { remaining: seconds, total: seconds };  // starten
  refreshTimerBtn(id);
}
function tickCountdowns() {
  Object.keys(countdowns).forEach(id => {
    const c = countdowns[id];
    c.remaining--;
    if (c.remaining <= 0) { delete countdowns[id]; if (soundOn) playBeep(); }
    refreshTimerBtn(id);
  });
}
setInterval(tickCountdowns, 1000);

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.value = 0.15;
    osc.start();
    setTimeout(() => { osc.frequency.value = 1000; }, 150);
    setTimeout(() => { osc.stop(); ctx.close(); }, 300);
  } catch(e) {}
}

function buildPhaseTabs() {
  const tabsContainer = document.getElementById('phase-tabs');
  const order = workouts[currentWorkout].phaseOrder;
  tabsContainer.innerHTML = order.map((key, i) => {
    const phaseTitle = phT(key, phases[key]).title;
    return `<button class="phase-tab ${key === currentPhase ? 'active' : ''}" data-phase="${key}">
      <span class="num">${ui('phase') || 'Phase'} ${i+1}</span><span>${phaseTitle}</span>
    </button>`;
  }).join('');
  tabsContainer.querySelectorAll('.phase-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      tabsContainer.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentPhase = tab.dataset.phase;
      countdowns = {};   // Timer der vorherigen Phase stoppen
      renderPhase(currentPhase);
    });
  });
}

function switchWorkout(key) {
  if (!workouts[key] || key === currentWorkout) return;
  currentWorkout = key;
  localStorage.setItem('nina_workout_active', key);
  phases = workouts[key].phases;
  currentPhase = workouts[key].phaseOrder[0];
  completedSets = {};
  countdowns = {};   // Timer beim Workout-Wechsel stoppen
  saveCurrent();
  document.querySelectorAll('.ws-btn').forEach(b => b.classList.toggle('active', b.dataset.workout === key));
  applyUI();
  buildPhaseTabs();
  renderPhase(currentPhase);
}

document.getElementById('sound-toggle').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('sound-toggle').textContent = soundOn ? '🔔' : '🔕';
});

// ── WORKOUT-STOPPUHR (an STORAGE.startTime gekoppelt) ──
function fmtClock(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  const pad = n => String(n).padStart(2,'0');
  return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}
function toggleWorkout() {
  if (localStorage.getItem(STORAGE.startTime)) stopWorkout();
  else startWorkout();
}
function startWorkout() {
  if (!localStorage.getItem(STORAGE.startTime)) {
    localStorage.setItem(STORAGE.startTime, Date.now().toString());
  }
  updateWorkoutClock();
}
function stopWorkout() {
  localStorage.removeItem(STORAGE.startTime);
  updateWorkoutClock();
}
function updateWorkoutClock() {
  const box = document.getElementById('workout-clock');
  const out = document.getElementById('workout-clock-time');
  const startBtn = document.getElementById('workout-start-btn');
  if (!box || !out) return;
  const start = parseInt(localStorage.getItem(STORAGE.startTime) || '0');
  if (start > 0) {
    box.classList.add('running'); out.textContent = fmtClock(Date.now() - start);
    if (startBtn) { startBtn.textContent = ui('btnStop'); startBtn.classList.add('stop'); }
  } else {
    box.classList.remove('running'); out.textContent = '00:00';
    if (startBtn) { startBtn.textContent = ui('btnStart'); startBtn.classList.remove('stop'); }
  }
}
setInterval(updateWorkoutClock, 1000);

// Init
loadCurrent();
document.querySelectorAll('.ls-btn').forEach(b => b.addEventListener('click', () => switchLang(b.dataset.lang)));
document.querySelectorAll('.ws-btn').forEach(b => b.classList.toggle('active', b.dataset.workout === currentWorkout));
applyUI();
buildPhaseTabs();
renderPhase(currentPhase);
updateWorkoutClock();
</script>



<script>
// ── PABLO PLAYER (1:1 von der Landingpage, eigener Positions-Key) ──
const pabloPlayer = document.getElementById('pablo-player');
const pabloPanel  = document.getElementById('pablo-panel');
(function() {
  const handle = document.getElementById('pablo-btn');
  const panelHeader = document.querySelector('.pablo-panel-header');
  let dragging = false, didDrag = false, startX, startY, startLeft, startTop;
  function beginDrag(cx, cy) {
    const r = pabloPlayer.getBoundingClientRect();
    pabloPlayer.style.bottom = 'auto'; pabloPlayer.style.right = 'auto';
    pabloPlayer.style.top = r.top + 'px'; pabloPlayer.style.left = r.left + 'px';
    startX = cx; startY = cy; startLeft = r.left; startTop = r.top;
    dragging = true; didDrag = false; handle.style.animationPlayState = 'paused';
  }
  function moveDrag(cx, cy) {
    if (!dragging) return;
    const dx = cx - startX, dy = cy - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    const w = pabloPlayer.offsetWidth, h = pabloPlayer.offsetHeight;
    const l = Math.max(0, Math.min(window.innerWidth - w, startLeft + dx));
    const t = Math.max(0, Math.min(window.innerHeight - h, startTop + dy));
    pabloPlayer.style.left = l + 'px'; pabloPlayer.style.top = t + 'px';
  }
  function endDrag() {
    if (!dragging) return;
    dragging = false; handle.style.animationPlayState = '';
    if (didDrag) localStorage.setItem('pablo-pos-gym', JSON.stringify({ top: pabloPlayer.style.top, left: pabloPlayer.style.left }));
  }
  function isMobile() { return window.innerWidth <= 600; }
  handle.addEventListener('mousedown',  e => { if (isMobile()) return; if (e.button === 0) { beginDrag(e.clientX, e.clientY); e.preventDefault(); } });
  handle.addEventListener('touchstart', e => { if (isMobile()) return; const t = e.touches[0]; beginDrag(t.clientX, t.clientY); }, { passive: true });
  handle.addEventListener('click', e => { if (didDrag) { e.stopPropagation(); didDrag = false; } }, true);
  if (panelHeader) {
    panelHeader.addEventListener('mousedown', e => { if (isMobile()) return; if (e.target.classList.contains('pablo-close-btn')) return; if (e.button === 0) { beginDrag(e.clientX, e.clientY); e.preventDefault(); } });
    panelHeader.addEventListener('touchstart', e => { if (isMobile()) return; if (e.target.classList.contains('pablo-close-btn')) return; const t = e.touches[0]; beginDrag(t.clientX, t.clientY); }, { passive: true });
  }
  document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup',   () => endDrag());
  document.addEventListener('touchmove', e => { if (dragging) { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
  document.addEventListener('touchend', () => endDrag());
  const saved = localStorage.getItem('pablo-pos-gym');
  if (saved) try {
    const p = JSON.parse(saved);
    const leftPx = parseInt(p.left || '0');
    const topPx = parseInt(p.top || '0');
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = pabloPlayer.offsetWidth || 150, h = pabloPlayer.offsetHeight || 150;
    // Nur restore wenn Position noch im aktuellen Viewport sichtbar — sonst Reset auf Default
    if (leftPx >= 0 && topPx >= 0 && leftPx + w <= vw && topPx + h <= vh) {
      pabloPlayer.style.bottom = 'auto';
      pabloPlayer.style.right = 'auto';
      pabloPlayer.style.top = p.top;
      pabloPlayer.style.left = p.left;
    } else {
      // Position passt nicht (Viewport-Wechsel Desktop→Mobile) → Default-Position vom CSS nutzen
      localStorage.removeItem('pablo-pos-gym');
    }
  } catch(e) {}
})();
function switchPlaylist(id, name, btn) {
  document.getElementById('pablo-iframe').src = 'https://open.spotify.com/embed/playlist/' + id + '?utm_source=generator&theme=0';
  document.getElementById('pablo-track-name').textContent = name;
  document.querySelectorAll('.pl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function togglePabloPanel() {
  pabloPanel.classList.toggle('open');
  // Auf Mobile: jegliche von Drag/JS gesetzte Inline-Position löschen → Mobile-CSS greift sauber
  if (window.innerWidth <= 600) {
    pabloPlayer.style.top = '';
    pabloPlayer.style.left = '';
    pabloPlayer.style.right = '';
    pabloPlayer.style.bottom = '';
  }
}
function setPabloState(state) { pabloPlayer.className = 'state-' + state; }
let _demo = 0;
document.getElementById('pablo-btn').addEventListener('dblclick', (e) => {
  e.stopPropagation();
  const states = ['idle', 'playing', 'sleeping'];
  _demo = (_demo + 1) % states.length;
  setPabloState(states[_demo]);
});
</script>
</body>
