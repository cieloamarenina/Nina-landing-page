<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning – Nina Learns Vibe Coding</title>
<meta name="description" content="What I learn while vibe coding — Claude Code, n8n, RAG, AI skills & frameworks. A topic-sorted learning reference.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1320'/><text x='2' y='22' font-family='monospace' font-weight='bold' font-size='13' fill='%2300d4ff'>NLC</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14; --surface: #0d1320; --card: #111827; --border: #1e2d45;
    --accent: #00d4ff;          /* Cyan (primary, matches main site) */
    --blue:   #2f6fed;          /* clear blue accent — no violet */
    --text: #e8f0fe; --muted: #8094b3;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.1rem 2rem; display: flex; justify-content: space-between; align-items: center;
    background: rgba(8,12,20,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--font-display); font-size: 1rem; font-weight: 800; color: var(--accent); letter-spacing: 0.04em; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-back { color: var(--accent); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.08em; padding: 0.4rem 0.9rem; border: 1px solid rgba(0,212,255,0.25); border-radius: 6px; white-space: nowrap; }
  .lang-switcher { display: flex; gap: 0.3rem; }
  .lang-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; padding: 0.25rem 0.5rem; font-family: var(--font-body); font-size: 0.7rem; font-weight: 600; cursor: pointer; }
  .lang-btn:hover { color: var(--accent); }
  .lang-btn.active { color: var(--accent); border-color: rgba(0,212,255,0.5); }

  .wrap { max-width: 820px; margin: 0 auto; padding: 7rem 1.5rem 5rem; }
  .badge { display: inline-block; color: var(--accent); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.8rem; }
  h1 { font-family: var(--font-display); font-size: 2.6rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.1; }
  .sub { color: var(--muted); font-size: 1.02rem; max-width: 620px; margin-bottom: 1.6rem; }

  .cat-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2.5rem; }
  .cat-chip { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.78rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .cat-chip:hover { color: var(--accent); border-color: rgba(0,212,255,0.4); }

  .cat { margin-bottom: 2.6rem; scroll-margin-top: 6rem; }
  .cat-head { display: flex; align-items: baseline; gap: 0.7rem; padding-bottom: 0.7rem; margin-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .cat-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; }
  .cat-count { color: var(--muted); font-size: 0.85rem; }

  .item { border-bottom: 1px solid rgba(30,45,69,0.6); }
  .item-head { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 0.2rem; cursor: pointer; transition: color 0.15s; }
  .item-head:hover { color: var(--accent); }
  .chevron { flex-shrink: 0; color: var(--blue); transition: transform 0.2s; font-size: 0.8rem; }
  .item.open .chevron { transform: rotate(90deg); }
  .item-title { flex: 1; font-size: 1.02rem; font-weight: 600; }
  .item-meta { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

  .item-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .item.open .item-body { max-height: 3000px; }
  .item-inner { padding: 0.2rem 0.2rem 1.6rem 2.2rem; }
  .item-lead { color: var(--muted); margin-bottom: 1.1rem; }

  .step { display: flex; gap: 0.9rem; padding: 0.5rem 0; }
  .step-n { flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px; background: var(--blue); color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; }
  .step-t { font-weight: 600; }
  .step-d { color: var(--muted); font-size: 0.9rem; }

  ul.bullets { list-style: none; margin: 0.2rem 0; }
  ul.bullets li { position: relative; padding: 0.3rem 0 0.3rem 1.2rem; color: var(--muted); font-size: 0.92rem; }
  ul.bullets li::before { content: "▸"; position: absolute; left: 0; color: var(--blue); }

  .tooltbl { width: 100%; border-collapse: collapse; margin-top: 0.4rem; font-size: 0.9rem; }
  .tooltbl td { padding: 0.5rem 0.6rem; border-bottom: 1px solid rgba(30,45,69,0.6); vertical-align: top; }
  .tooltbl td:first-child { color: var(--accent); font-weight: 600; white-space: nowrap; width: 150px; font-family: var(--font-body); }
  .tooltbl td:last-child { color: var(--muted); }

  .takeaway { margin-top: 1.3rem; padding: 0.9rem 1.1rem; background: rgba(47,111,237,0.1); border-left: 3px solid var(--blue); border-radius: 6px; font-size: 0.92rem; }
  .takeaway b { color: var(--blue); }
  .source { margin-top: 0.8rem; font-size: 0.78rem; color: var(--muted); }
  .source a { color: var(--accent); text-decoration: none; }
  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1.1rem; }
  .tag { font-size: 0.68rem; color: var(--accent); background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); border-radius: 20px; padding: 0.2rem 0.7rem; }

  .loading, .errored { color: var(--muted); padding: 2rem 0; }
  .footer { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 4rem; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }

  /* RTL (Hebrew) — mirror directionally hard-coded rules */
  html[dir="rtl"] .item-inner { padding: 0.2rem 2.2rem 1.6rem 0.2rem; }
  html[dir="rtl"] ul.bullets li { padding: 0.3rem 1.2rem 0.3rem 0; }
  html[dir="rtl"] ul.bullets li::before { content: "◂"; left: auto; right: 0; }
  html[dir="rtl"] .takeaway { border-left: none; border-right: 3px solid var(--blue); }

  @media (max-width: 560px) {
    h1 { font-size: 2rem; }
    .wrap { padding-top: 6rem; }
    nav { padding: 0.9rem 1rem; }
    .nav-right { gap: 0.6rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">[ NLC ] learning</a>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="he" lang="he">עברית</button>
    </div>
    <a href="/" class="nav-back" data-i18n="back">← back to nlc</a>
  </div>
</nav>

<div class="wrap">
  <div class="badge">// learning</div>
  <h1 id="page-title">Learning</h1>
  <p class="sub" id="page-sub"></p>
  <div class="cat-nav" id="cat-nav"></div>
  <div id="cats"><div class="loading">Loading…</div></div>
</div>

<div class="footer" id="footer"></div>

<script>
const FALLBACK_UI = {
  en: { title:"Learning", sub:"What I learn while vibe coding — sorted by topic. Tap an entry and the text unfolds.", entries:"entries", takeaway:"Key Takeaway", source:"Source", back:"← back to nlc", footer:"Built with Claude as co-pilot · part of my public learning journey." },
  de: { title:"Lernen", sub:"Was ich beim Vibe Coding lerne — nach Themen sortiert. Tippe auf einen Eintrag, der Text klappt auf.", entries:"Einträge", takeaway:"Key Takeaway", source:"Quelle", back:"← zurück zu nlc", footer:"Gebaut mit Claude als Co-Pilot · Teil meiner öffentlichen Lernreise." },
  fr: { title:"Apprentissage", sub:"Ce que j'apprends en codant avec l'IA — trié par thème. Touchez une entrée, le texte se déplie.", entries:"entrées", takeaway:"À retenir", source:"Source", back:"← retour à nlc", footer:"Conçu avec Claude comme copilote · partie de mon apprentissage public." },
  it: { title:"Apprendimento", sub:"Cosa imparo facendo vibe coding — ordinato per tema. Tocca una voce e il testo si apre.", entries:"voci", takeaway:"Da ricordare", source:"Fonte", back:"← torna a nlc", footer:"Realizzato con Claude come copilota · parte del mio percorso di apprendimento pubblico." },
  es: { title:"Aprendizaje", sub:"Lo que aprendo mientras programo con IA — ordenado por tema. Toca una entrada y el texto se despliega.", entries:"entradas", takeaway:"Para recordar", source:"Fuente", back:"← volver a nlc", footer:"Creado con Claude como copiloto · parte de mi aprendizaje público." },
  he: { title:"למידה", sub:"מה שאני לומדת תוך כדי vibe coding — ממוין לפי נושא. הקישו על רשומה והטקסט נפרש.", entries:"רשומות", takeaway:"תובנה מרכזית", source:"מקור", back:"← חזרה ל-nlc", footer:"נבנה עם Claude כטייס משנה · חלק ממסע הלמידה הציבורי שלי." }
};

let DATA = null;
let lang = (localStorage.getItem('nlvc_lang') && ['en','de','fr','it','es','he'].includes(localStorage.getItem('nlvc_lang'))) ? localStorage.getItem('nlvc_lang') : 'en';

const $cats = document.getElementById('cats');
const $catNav = document.getElementById('cat-nav');

function ui(key){
  const u = (DATA && DATA.ui && DATA.ui[lang]) || FALLBACK_UI[lang] || FALLBACK_UI.en;
  return u[key] ?? (FALLBACK_UI.en[key] || '');
}

function catLabel(cat){
  return (cat.label && (cat.label[lang] || cat.label.en)) || cat.key;
}

function entryBody(it){
  const tr = it.translations[lang] || it.translations.en;
  let html = '';
  if (tr.lead) html += `<div class="item-lead">${tr.lead}</div>`;
  if (tr.steps) html += tr.steps.map((s,i)=>`<div class="step"><div class="step-n">${i+1}</div><div><div class="step-t">${s.t}</div>${s.d?`<div class="step-d">${s.d}</div>`:''}</div></div>`).join('');
  if (tr.table) html += `<table class="tooltbl">${tr.table.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>`;
  if (tr.bullets) html += `<ul class="bullets">${tr.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
  if (tr.takeaway) html += `<div class="takeaway"><b>${ui('takeaway')} · </b>${tr.takeaway}</div>`;
  if (it.source) html += `<div class="source">${ui('source')}: ${it.source.url?`<a href="${it.source.url}" target="_blank" rel="noopener">${it.source.name}</a>`:it.source.name}</div>`;
  if (it.tags && it.tags.length) html += `<div class="tags">${it.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  return `<div class="item-inner">${html}</div>`;
}

function entryMeta(it){
  const tr = it.translations[lang] || it.translations.en;
  if (tr.meta) return tr.meta;
  if (it.meta) return Object.values(it.meta).join(' · ');
  return '';
}

function render(){
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'he') ? 'rtl' : 'ltr';
  document.getElementById('page-title').textContent = ui('title');
  document.getElementById('page-sub').textContent = ui('sub');
  document.getElementById('footer').textContent = ui('footer');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = ui(el.dataset.i18n); });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  if (!DATA) return;

  // category quick-nav
  $catNav.innerHTML = DATA.categories.map(c => `<a class="cat-chip" href="#cat-${c.key}">${catLabel(c)}</a>`).join('');

  // categories + entries
  $cats.innerHTML = DATA.categories.map(c => {
    const items = DATA.learnings.filter(l => l.category === c.key);
    if (!items.length) return '';
    return `<div class="cat" id="cat-${c.key}">
      <div class="cat-head"><span class="cat-title">${catLabel(c)}</span><span class="cat-count">${items.length} ${ui('entries')}</span></div>
      ${items.map(it => {
        const tr = it.translations[lang] || it.translations.en;
        return `<div class="item">
          <div class="item-head"><span class="chevron">▶</span><span class="item-title">${tr.title}</span><span class="item-meta">${entryMeta(it)}</span></div>
          <div class="item-body">${entryBody(it)}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  $cats.querySelectorAll('.item-head').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('open')));
}

document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => {
  lang = b.dataset.lang;
  localStorage.setItem('nlvc_lang', lang);
  render();
}));

fetch('learnings.json?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.json(); })
  .then(data => { DATA = data; render(); })
  .catch(() => { $cats.innerHTML = `<div class="errored">⚠️ ${lang==='de'?'Inhalte konnten nicht geladen werden.':'Could not load content.'}</div>`; });
</script>
</body>
</html>
