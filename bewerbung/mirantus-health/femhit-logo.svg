<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect width="300" height="300" fill="#0E1B38" rx="24"/>

  <!-- Decorative arc (feminine/empowerment element) -->
  <circle cx="150" cy="115" r="54" fill="none" stroke="#2EA8A0" stroke-width="5" stroke-dasharray="220 340" stroke-linecap="round" transform="rotate(-30 150 115)"/>

  <!-- FEM -->
  <text x="150" y="130" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#F5F7FB" text-anchor="middle" letter-spacing="-1">FEM</text>

  <!-- hit -->
  <text x="150" y="175" font-family="Georgia, serif" font-size="42" font-weight="400" fill="#2EA8A0" text-anchor="middle" letter-spacing="6">hit</text>

  <!-- Tagline -->
  <text x="150" y="218" font-family="Helvetica Neue, sans-serif" font-size="11" font-weight="400" fill="rgba(245,247,251,0.55)" text-anchor="middle" letter-spacing="2.5">FINANCE · WOMEN · AI</text>

  <!-- Bottom line accent -->
  <line x1="100" y1="230" x2="200" y2="230" stroke="#2EA8A0" stroke-width="1.5" opacity="0.5"/>
</svg>
