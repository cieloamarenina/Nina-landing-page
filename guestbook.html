<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --bg: #080c14;
    --surface: #0d1320;
    --card: #111827;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e8f0fe;
    --muted: #6b7fa3;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  .lang-switcher {
    display: flex;
    gap: 0.3rem;
    align-items: center;
  }

  .lang-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.45rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .lang-btn:hover { color: var(--accent); border-color: rgba(0,212,255,0.3); }
  .lang-btn.active { color: var(--accent); border-color: rgba(0,212,255,0.5); }

  main {
    position: relative;
    z-index: 1;
    padding: 8rem 2rem 6rem;
    max-width: 760px;
    margin: 0 auto;
  }

  .section-tag {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .section-tag::after {
    content: '';
    flex: 1;
    max-width: 60px;
    height: 1px;
    background: var(--accent);
    opacity: 0.4;
  }

  .page-title {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
  }

  .page-sub {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 3rem;
    max-width: 520px;
  }

  /* ----- Formular ----- */
  .gb-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .gb-form label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .gb-form input[type="text"],
  .gb-form textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 0.7rem 0.9rem;
    margin-bottom: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .gb-form input[type="text"]:focus,
  .gb-form textarea:focus { border-color: rgba(0,212,255,0.5); }

  .gb-form textarea { min-height: 110px; }

  /* Honeypot: fuer Menschen unsichtbar, Bots fuellen es aus */
  .gb-hp {
    position: absolute !important;
    left: -9999px !important;
    width: 1px; height: 1px;
    overflow: hidden;
    opacity: 0;
  }

  .gb-form-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .gb-count {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .gb-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.7rem 1.6rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .gb-btn:hover:not(:disabled) { background: rgba(0,212,255,0.1); box-shadow: 0 0 20px rgba(0,212,255,0.15); }
  .gb-btn:disabled { opacity: 0.4; cursor: wait; }

  .gb-privacy {
    font-size: 0.62rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 3rem;
  }

  .gb-msg {
    display: none;
    padding: 0.8rem 1rem;
    font-size: 0.75rem;
    margin-bottom: 3rem;
    border: 1px solid;
  }

  .gb-msg.ok { display: block; border-color: rgba(0,212,255,0.4); color: var(--accent); background: rgba(0,212,255,0.05); }
  .gb-msg.err { display: block; border-color: rgba(255,107,107,0.4); color: #ff6b6b; background: rgba(255,107,107,0.05); }

  /* ----- Eintraege ----- */
  .gb-list { display: flex; flex-direction: column; gap: 1rem; }

  .gb-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent2);
    padding: 1.1rem 1.3rem;
  }

  .gb-entry-head {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }

  .gb-entry-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
  }

  .gb-entry-flag { font-size: 0.8rem; }

  .gb-entry-date {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  .gb-entry-msg {
    font-size: 0.8rem;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .gb-entry-foot { margin-top: 0.6rem; }

  .gb-translate {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .gb-translate:hover { color: var(--text); }

  .gb-translated-note {
    font-size: 0.62rem;
    color: var(--muted);
    font-style: italic;
    margin-right: 0.6rem;
  }

  .gb-empty, .gb-loading, .gb-load-error {
    font-size: 0.78rem;
    color: var(--muted);
    padding: 2rem 0;
    text-align: center;
  }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 3rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--accent);
  }

  .footer-copy {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    nav .nav-links { display: none; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }

  /* ----- RTL (Hebrew) ----- */
  html[dir="rtl"] .gb-entry {
    border-left: 1px solid var(--border);
    border-right: 2px solid var(--accent2);
  }
  html[dir="rtl"] .gb-entry-date { margin-left: 0; margin-right: auto; }
  html[dir="rtl"] .gb-translated-note { margin-right: 0; margin-left: 0.6rem; }
</style>
</head>

<main>

  <div class="gb-msg" id="gb-msg" role="status"></div>

  <div class="gb-list" id="gb-list">

  </div>
</main>

let _entries = [];

function getLang() { return localStorage.getItem('nlvc_lang') || 'en'; }
function t() { return UI[getLang()] || UI.en; }

function applyUI(lang) {
  const u = UI[lang] || UI.en;
  document.getElementById('gb-tag').textContent = u.tag;
  document.getElementById('gb-title').textContent = u.title;
  document.getElementById('gb-sub').textContent = u.sub;
  document.getElementById('gb-label-name').textContent = u.name;
  document.getElementById('gb-label-message').textContent = u.message;
  document.getElementById('gb-submit').textContent = u.send;
  document.getElementById('gb-privacy').textContent = u.privacy;
  document.getElementById('footer-copy').textContent = u.footer;
  document.getElementById('nav-about').textContent = u.nav.about;
  document.getElementById('nav-journey').textContent = u.nav.journey;
  document.getElementById('nav-stack').textContent = u.nav.stack;
  document.getElementById('nav-blog').textContent = u.nav.blog;
  document.getElementById('nav-guestbook').textContent = u.nav.guestbook;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'he') ? 'rtl' : 'ltr';
  localStorage.setItem('nlvc_lang', lang);
}

/* Eintraege rendern — bewusst NUR mit createElement/textContent (kein innerHTML
   mit Gast-Inhalten), damit niemand Script-Code ins Gaestebuch schreiben kann. */
function renderEntries() {
  const lang = getLang();
  const u = t();
  const list = document.getElementById('gb-list');
  list.replaceChildren();

  if (!_entries.length) {
    const empty = document.createElement('div');
    empty.className = 'gb-empty';
    empty.textContent = u.empty;
    list.appendChild(empty);
    return;
  }

  for (const e of _entries) {
    const card = document.createElement('div');
    card.className = 'gb-entry';

    const head = document.createElement('div');
    head.className = 'gb-entry-head';

    const flag = document.createElement('span');
    flag.className = 'gb-entry-flag';
    flag.textContent = FLAGS[e.lang] || '🌐';
    head.appendChild(flag);

    const name = document.createElement('span');
    name.className = 'gb-entry-name';
    name.textContent = e.name;
    head.appendChild(name);

    const date = document.createElement('span');
    date.className = 'gb-entry-date';
    try {
      date.textContent = new Date(e.date + 'T00:00:00').toLocaleDateString(LANG_LOCALE[lang] || 'en-GB', {day:'numeric', month:'long', year:'numeric'});
    } catch (_) { date.textContent = e.date; }
    head.appendChild(date);
    card.appendChild(head);

    const msg = document.createElement('p');
    msg.className = 'gb-entry-msg';
    msg.textContent = e.message;
    card.appendChild(msg);

    const translated = e.translations && typeof e.translations === 'object' ? e.translations[lang] : null;
    if (e.lang !== lang && translated) {
      const foot = document.createElement('div');
      foot.className = 'gb-entry-foot';

      const note = document.createElement('span');
      note.className = 'gb-translated-note';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'gb-translate';
      btn.textContent = u.translate;

      let showingTranslation = false;
      btn.addEventListener('click', () => {
        showingTranslation = !showingTranslation;
        if (showingTranslation) {
          msg.textContent = translated;
          note.textContent = u.translated_from + ' ' + (u.langNames[e.lang] || e.lang.toUpperCase());
          btn.textContent = u.original;
        } else {
          msg.textContent = e.message;
          note.textContent = '';
          btn.textContent = u.translate;
        }
      });

      foot.appendChild(note);
      foot.appendChild(btn);
      card.appendChild(foot);
    }

    list.appendChild(card);
  }
}

function showMsg(text, kind) {
  const box = document.getElementById('gb-msg');
  box.textContent = text;
  box.className = 'gb-msg ' + kind;
}

function loadEntries() {
  fetch(LIST_URL)
    .then(r => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
    .then(data => {
      _entries = Array.isArray(data.entries) ? data.entries : [];
      renderEntries();
    })
    .catch(() => {
      const list = document.getElementById('gb-list');
      list.replaceChildren();
      const err = document.createElement('div');
      err.className = 'gb-load-error';
      err.textContent = t().load_error;
      list.appendChild(err);
    });
}

document.getElementById('gb-message').addEventListener('input', ev => {
  document.getElementById('gb-count-num').textContent = String(ev.target.value.length);
});

document.getElementById('gb-form').addEventListener('submit', ev => {
  ev.preventDefault();
  const u = t();
  const name = document.getElementById('gb-name').value.trim();
  const message = document.getElementById('gb-message').value.trim();
  const website = document.getElementById('gb-website').value; // Honeypot

  if (name.length < 2 || message.length < 5) { showMsg(u.err_invalid, 'err'); return; }

  const btn = document.getElementById('gb-submit');
  btn.disabled = true;
  btn.textContent = u.sending;

  fetch(SUBMIT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, message, lang: getLang(), website }),
  })
    .then(r => {
      if (r.status === 429) { showMsg(u.err_rate, 'err'); return null; }
      if (!r.ok) { showMsg(u.err_invalid, 'err'); return null; }
      return r.json();
    })
    .then(data => {
      if (data && data.success) {
        showMsg(u.success, 'ok');
        document.getElementById('gb-form').reset();
        document.getElementById('gb-count-num').textContent = '0';
      }
    })
    .catch(() => showMsg(u.err_network, 'err'))
    .finally(() => {
      btn.disabled = false;
      btn.textContent = t().send;
    });
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyUI(btn.dataset.lang);
    renderEntries();
  });
});

applyUI(getLang());
loadEntries();
</script>
</body>
</html>
