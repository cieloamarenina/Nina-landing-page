<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ninas Wetter</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ninas Wetter">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://n8n.ninalearnsvibecoding.com">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://unpkg.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js" defer></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<style>
#installBar{position:fixed;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));z-index:9999;display:flex;align-items:center;gap:10px;background:rgba(12,18,28,.94);color:#eaf2ff;border:1px solid rgba(120,160,220,.3);border-radius:14px;padding:12px 14px;font:500 13px/1.45 'JetBrains Mono',system-ui,sans-serif;backdrop-filter:blur(8px);box-shadow:0 8px 30px rgba(0,0,0,.45);max-width:560px;margin:0 auto}
#installBar b{color:#8fd0ff}
#installBtn{background:#2b6cff;color:#fff;border:0;border-radius:9px;padding:8px 12px;font:600 13px/1 inherit;cursor:pointer;white-space:nowrap}
#installClose{margin-left:auto;background:none;border:0;color:#9fb3cc;font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
</style>
</head>
<body>
<div id="app" class="scene"><div class="boot">Ninas Wetter</div></div>
<div id="installBar" hidden><span id="installMsg"></span><button id="installBtn" hidden></button><button id="installClose" aria-label="close">&times;</button></div>
<script type="module" src="js/app.js"></script>
<script>
(function(){
  var T={
    de:{ios:'\U0001F4F2 Installieren: in <b>Safari</b> auf das Teilen-Symbol tippen, dann „Zum Home-Bildschirm“.',btn:'App installieren'},
    en:{ios:'\U0001F4F2 Install: in <b>Safari</b>, tap Share, then “Add to Home Screen”.',btn:'Install app'},
    fr:{ios:'\U0001F4F2 Installer : dans <b>Safari</b>, touchez Partager, puis « Sur l’écran d’accueil ».',btn:'Installer l’app'},
    it:{ios:'\U0001F4F2 Installa: in <b>Safari</b>, tocca Condividi, poi “Aggiungi a Home”.',btn:'Installa app'},
    es:{ios:'\U0001F4F2 Instalar: en <b>Safari</b>, toca Compartir y luego “Añadir a pantalla de inicio”.',btn:'Instalar app'},
    he:{ios:'\U0001F4F2 התקנה: ב-<b>Safari</b> הקישו על שיתוף, ואז „הוספה למסך הבית“.',btn:'התקנת האפליקציה'}
  };
  var lang=(localStorage.getItem('aether.lang')||navigator.language||'en').slice(0,2);
  var t=T[lang]||T.en;
  if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true) return;
  if(localStorage.getItem('aether.installDismiss')==='1') return;
  var bar=document.getElementById('installBar'),msg=document.getElementById('installMsg'),btn=document.getElementById('installBtn'),cls=document.getElementById('installClose');
  cls.onclick=function(){bar.hidden=true;localStorage.setItem('aether.installDismiss','1');};
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();var dp=e;msg.textContent='\U0001F4F2';btn.textContent=t.btn;btn.hidden=false;bar.hidden=false;btn.onclick=function(){btn.hidden=true;bar.hidden=true;dp.prompt();};});
  if(isIOS){msg.innerHTML=t.ios;bar.hidden=false;}
})();
</script>
</body>
</html>
