<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1320'/><text x='2' y='22' font-family='monospace' font-weight='bold' font-size='13' fill='%2300d4ff'>NLC</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel — Nina Learns Vibe Coding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1320;
    --card: #111827;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e8f0fe;
    --muted: #6b7fa3;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--accent); }

  main {
    position: relative;
    z-index: 1;
    padding: 8rem 2rem 6rem;
    max-width: 720px;
    margin: 0 auto;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--accent); }

  .article-tag {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.25);
    padding: 0.3rem 0.8rem;
  }

  .article-title {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .article-date {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .article-content {
    font-size: 0.95rem;
    line-height: 2;
    color: var(--text);
  }

  .article-content p {
    margin-bottom: 1.5rem;
    color: #c8d8f0;
  }

  .article-content p:last-child { margin-bottom: 0; }

  .not-found {
    text-align: center;
    padding: 6rem 0;
  }

  .not-found h1 {
    font-family: var(--font-display);
    font-size: 3rem;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .not-found p {
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .not-found a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,212,255,0.3);
  }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 3rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--accent);
  }

  .footer-copy {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    nav .nav-links { display: none; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">NLC_</a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#journey">Journey</a></li>
    <li><a href="index.html#tools">Stack</a></li>
    <li><a href="blog.html">Blog</a></li>
  </ul>
</nav>

<main id="article-main">
  <p style="color:var(--muted);font-size:0.8rem;">Lade Artikel...</p>
</main>

<footer>
  <div class="footer-logo">NLC_</div>
  <div class="footer-copy">© 2026 Nina Panknin — Learning in Public</div>
</footer>

<script>
  const slug = new URLSearchParams(window.location.search).get('slug');
  const main = document.getElementById('article-main');

  if (!slug) {
    showNotFound();
  } else {
    fetch('articles.json')
      .then(r => r.json())
      .then(articles => {
        const article = articles.find(a => a.slug === slug);
        if (!article) { showNotFound(); return; }
        document.title = `${article.title} — Nina Learns Vibe Coding`;
        main.innerHTML = `
          <a class="back-link" href="blog.html">← Zurück zum Blog</a>
          <div class="article-tag">${article.tag}</div>
          <h1 class="article-title">${article.title}</h1>
          <div class="article-date">${formatDate(article.date)}</div>
          <div class="article-content">${article.content}</div>
        `;
      })
      .catch(showNotFound);
  }

  function showNotFound() {
    main.innerHTML = `
      <div class="not-found">
        <h1>404</h1>
        <p>Dieser Artikel existiert nicht (mehr).</p>
        <a href="blog.html">← Zurück zum Blog</a>
      </div>
    `;
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('de-DE', {
      day: 'numeric', month: 'long', year: 'numeric'
    });
  }
</script>
</body>
</html>
