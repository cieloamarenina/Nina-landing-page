<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Elfmeter-Challenge 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1024; --ink-2:#0f1c44; --brand:#2563eb; --brand-deep:#1e3a8a;
    --sky:#38bdf8; --text:#e8eefc; --muted:#93a4cc;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% -10%, #15265e 0%, var(--ink) 55%, #06091a 100%);
    color:var(--text); min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  }
  header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:18px 6px 14px}
  .brand{display:flex;align-items:center;gap:10px}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--sky);box-shadow:0 0 14px var(--sky)}
  .title{font-family:'Bebas Neue',Impact,sans-serif;font-size:34px;letter-spacing:1.5px;line-height:1;color:var(--text)}
  .title b{color:var(--sky);font-weight:400}
  .board{font-family:'Bebas Neue',sans-serif;background:linear-gradient(180deg,var(--brand-deep),#0c1230);
    border:1px solid rgba(56,189,248,.35);border-radius:12px;padding:6px 14px;display:flex;gap:14px;align-items:center;
    box-shadow:0 0 18px rgba(37,99,235,.25), inset 0 0 12px rgba(0,0,0,.4)}
  .board .seg{display:flex;flex-direction:column;align-items:center;line-height:1}
  .board .num{font-size:30px;letter-spacing:1px;color:var(--sky)}
  .board .lbl{font-family:'Inter';font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px}

  .stage{position:relative;width:100%;max-width:760px;border-radius:18px;overflow:hidden;
    border:1px solid rgba(56,189,248,.18);box-shadow:0 24px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.03) inset;
    background:#070d22;line-height:0}
  #gl{display:block;width:100%;height:auto;touch-action:none;-webkit-user-select:none;user-select:none;cursor:crosshair}

  /* Overlay-Text (TOR! / GEHALTEN!) */
  #flash{position:absolute;top:14%;left:0;right:0;text-align:center;pointer-events:none;z-index:4;
    font-family:'Bebas Neue',Impact,sans-serif;font-size:84px;letter-spacing:2px;opacity:0;transition:opacity .15s}
  #flash.show{opacity:1}

  footer{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:14px 6px 22px;gap:12px}
  .hint{font-size:13px;color:var(--muted)}
  .badge{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--sky);
    border:1px solid rgba(56,189,248,.4);padding:4px 10px;border-radius:999px;white-space:nowrap}
  #matchup{font-size:16px;letter-spacing:2px}

  /* ── Länder-Picker ───────────────────────────── */
  #picker,#final{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;padding:14px 14px 12px;
    background:linear-gradient(180deg,rgba(8,14,34,.93),rgba(6,9,26,.97));-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  #picker.hidden,#final.hidden{display:none}
  #picker h2,#final h2{font-family:'Bebas Neue',Impact,sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--sky);text-align:center;margin-bottom:8px}
  .slots{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
  .slot{flex:1;max-width:240px;display:flex;align-items:center;justify-content:center;gap:9px;padding:8px 10px;border-radius:12px;
    border:1px solid rgba(56,189,248,.3);background:rgba(13,18,48,.6);cursor:pointer}
  .slot .who{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .slot .fl{font-size:26px;line-height:1}
  .slot.s.active{border-color:#ffce00;box-shadow:0 0 14px rgba(255,206,0,.45)}
  .slot.k.active{border-color:#ff5a7a;box-shadow:0 0 14px rgba(255,90,122,.45)}
  .grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;padding:6px;align-content:start}
  .flag{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:10px;background:rgba(255,255,255,.04);border:2px solid transparent;cursor:pointer}
  .flag:hover{background:rgba(56,189,248,.12)}
  .flag .e{font-size:26px;line-height:1}
  .flag .nm{font-size:8px;letter-spacing:.2px;color:var(--muted);text-align:center;line-height:1.1}
  .flag.sel-s{border-color:#ffce00;background:rgba(255,206,0,.12)}
  .flag.sel-k{border-color:#ff5a7a;background:rgba(255,90,122,.12)}
  .btn{margin-top:10px;align-self:center;font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;letter-spacing:1.5px;
    color:#06122e;background:var(--sky);border:none;border-radius:12px;padding:10px 32px;cursor:pointer;box-shadow:0 6px 20px rgba(56,189,248,.4)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  #final{align-items:center;justify-content:center;text-align:center;gap:6px}
  #final .score{font-family:'Bebas Neue',Impact,sans-serif;font-size:120px;line-height:1;color:var(--sky);text-shadow:0 0 28px rgba(56,189,248,.6)}
  #final .rate{font-family:'Bebas Neue',Impact,sans-serif;font-size:34px;color:var(--text)}
  #final .teams{font-size:22px;letter-spacing:2px;margin-bottom:6px}
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span><span class="title">Elfmeter<b>·</b>Challenge</span></div>
    <div class="board" aria-label="Spielstand">
      <div class="seg"><span class="num" id="score">0</span><span class="lbl">Tore</span></div>
      <div class="seg"><span class="num" id="shots">0</span><span class="lbl">Schuss</span></div>
      <div class="seg"><span class="num" id="best">–</span><span class="lbl">Best</span></div>
    </div>
  </header>

  <div class="stage" id="stage">
    <canvas id="gl"></canvas>
    <div id="flash"></div>

    <div id="picker">
      <h2>Wähle deine Teams</h2>
      <div class="slots">
        <div class="slot s active" id="slotS"><span class="who">Schütze</span><span class="fl" id="flS">🏳️</span></div>
        <div class="slot k" id="slotK"><span class="who">Torwart</span><span class="fl" id="flK">🏳️</span></div>
      </div>
      <div class="grid" id="flagGrid"></div>
      <button class="btn" id="startBtn" disabled>Anpfiff ⚽</button>
    </div>

    <div id="final" class="hidden">
      <h2>Endstand</h2>
      <div class="teams" id="finalTeams">🇩🇪 vs 🇧🇷</div>
      <div class="score" id="finalScore">0 / 10</div>
      <div class="rate" id="finalRate"></div>
      <button class="btn" id="againBtn">Neues Spiel</button>
    </div>
  </div>

  <footer>
    <span class="hint" id="hint">Wähle Schütze &amp; Torwart</span>
    <span class="badge" id="matchup">🇩🇪 vs 🇧🇷</span>
  </footer>

<script type="importmap">

<script type="module">
import * as THREE from 'three';

/* ===== WM-2026-Teams (48): Name, Flagge, Trikot j / Trim t / Nummer u ===== */
const COUNTRIES = [
  {n:'Ägypten',f:'🇪🇬',j:'#ce1126',t:'#ffffff',u:'#000000'},

  {n:'England',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',j:'#ffffff',t:'#001f6e',u:'#ce1124'},
  {n:'Frankreich',f:'🇫🇷',j:'#002395',t:'#ffffff',u:'#ed2939'},
  {n:'Ghana',f:'🇬🇭',j:'#ce1126',t:'#fcd116',u:'#006b3f'},
  {n:'Haiti',f:'🇭🇹',j:'#00209f',t:'#d21034',u:'#ffffff'},
  {n:'Irak',f:'🇮🇶',j:'#ce1126',t:'#ffffff',u:'#007a3d'},
  {n:'Iran',f:'🇮🇷',j:'#ffffff',t:'#239f40',u:'#da0000'},
  {n:'Japan',f:'🇯🇵',j:'#002b7f',t:'#ffffff',u:'#bc002d'},
  {n:'Jordanien',f:'🇯🇴',j:'#ce1126',t:'#000000',u:'#ffffff'},
  {n:'Kanada',f:'🇨🇦',j:'#d52b1e',t:'#ffffff',u:'#d52b1e'},
  {n:'Kap Verde',f:'🇨🇻',j:'#003893',t:'#ffffff',u:'#cf2027'},
  {n:'Katar',f:'🇶🇦',j:'#8a1538',t:'#ffffff',u:'#8a1538'},
  {n:'Kolumbien',f:'🇨🇴',j:'#fcd116',t:'#003893',u:'#ce1126'},
  {n:'Kroatien',f:'🇭🇷',j:'#ff0000',t:'#ffffff',u:'#171796'},
  {n:'Marokko',f:'🇲🇦',j:'#c1272d',t:'#006233',u:'#ffffff'},
  {n:'Mexiko',f:'🇲🇽',j:'#006847',t:'#ce1126',u:'#ffffff'},
  {n:'Neuseeland',f:'🇳🇿',j:'#ffffff',t:'#000000',u:'#cc142b'},
  {n:'Niederlande',f:'🇳🇱',j:'#f36c21',t:'#ffffff',u:'#21468b'},
  {n:'Norwegen',f:'🇳🇴',j:'#ba0c2f',t:'#00205b',u:'#ffffff'},
  {n:'Österreich',f:'🇦🇹',j:'#ed2939',t:'#ffffff',u:'#ed2939'},
  {n:'Panama',f:'🇵🇦',j:'#db0b1a',t:'#005293',u:'#ffffff'},
  {n:'Paraguay',f:'🇵🇾',j:'#d52b1e',t:'#0038a8',u:'#ffffff'},
  {n:'Portugal',f:'🇵🇹',j:'#c8102e',t:'#006847',u:'#ffd700'},
  {n:'Saudi-Arabien',f:'🇸🇦',j:'#006c35',t:'#ffffff',u:'#006c35'},
  {n:'Schottland',f:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',j:'#0065bd',t:'#ffffff',u:'#ffffff'},
  {n:'Schweden',f:'🇸🇪',j:'#006aa7',t:'#fecc00',u:'#006aa7'},
  {n:'Schweiz',f:'🇨🇭',j:'#d52b1e',t:'#ffffff',u:'#d52b1e'},
  {n:'Senegal',f:'🇸🇳',j:'#00853f',t:'#fdef42',u:'#e31b23'},
  {n:'Spanien',f:'🇪🇸',j:'#c60b1e',t:'#ffc400',u:'#1a237e'},
  {n:'Südafrika',f:'🇿🇦',j:'#007749',t:'#ffb81c',u:'#000000'},
  {n:'Südkorea',f:'🇰🇷',j:'#cd2e3a',t:'#0047a0',u:'#ffffff'},
  {n:'Tschechien',f:'🇨🇿',j:'#11457e',t:'#d7141a',u:'#ffffff'},
  {n:'Tunesien',f:'🇹🇳',j:'#e70013',t:'#ffffff',u:'#e70013'},
  {n:'Türkei',f:'🇹🇷',j:'#e30a17',t:'#ffffff',u:'#e30a17'},
  {n:'Uruguay',f:'🇺🇾',j:'#7b9fd4',t:'#ffffff',u:'#ffcc00'},
  {n:'USA',f:'🇺🇸',j:'#002868',t:'#bf0a30',u:'#ffffff'},
  {n:'Usbekistan',f:'🇺🇿',j:'#0099b5',t:'#ffffff',u:'#1eb53a'},
];
const idxByName = nm => COUNTRIES.findIndex(c => c.n === nm);
let SHOOTER  = COUNTRIES[idxByName('Deutschland')];
let KEEPER_C = COUNTRIES[idxByName('Brasilien')];

/* ===== Konstanten ===== */
const MAX_SHOTS = 10;
const GW = 7.32, GH = 2.44, HALF = GW/2, SPOT_Z = 11, BALL_R = 0.12;
const KEEPER_READ = 0.34;   // Chance, dass der Torwart die Ecke "liest" (fair: Schütze im Vorteil)
const SHOT_MS = 700, HOLD_MS = 1400, COUNT_MS = 650;

/* ===== DOM ===== */
const $score=document.getElementById('score'), $shots=document.getElementById('shots'), $best=document.getElementById('best');
const $hint=document.getElementById('hint'), $match=document.getElementById('matchup'), $flash=document.getElementById('flash');
const stageEl=document.getElementById('stage'), glCanvas=document.getElementById('gl');

/* ===== Three.js Setup ===== */
const renderer = new THREE.WebGLRenderer({canvas:glCanvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1430);
scene.fog = new THREE.Fog(0x0a1430, 26, 70);

const camera = new THREE.PerspectiveCamera(42, 16/10, 0.1, 200);
camera.position.set(0, 1.5, 15.4);
camera.lookAt(0, 1.05, -8);

/* Licht */
scene.add(new THREE.HemisphereLight(0xbcd2ff, 0x16331f, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 1.25);
sun.position.set(8, 16, 10); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=60;
sun.shadow.camera.left=-18; sun.shadow.camera.right=18; sun.shadow.camera.top=18; sun.shadow.camera.bottom=-18;
scene.add(sun);
// Flutlicht-Schimmer
const fl1 = new THREE.PointLight(0xbfe0ff, 0.6, 60); fl1.position.set(-10,12,-6); scene.add(fl1);
const fl2 = new THREE.PointLight(0xbfe0ff, 0.6, 60); fl2.position.set(10,12,-6); scene.add(fl2);

/* ===== Texturen (Canvas) ===== */
function makeGrass(){
  const c=document.createElement('canvas'); c.width=c.height=512; const x=c.getContext('2d');
  for(let i=0;i<16;i++){ x.fillStyle = i%2 ? '#1f8a47' : '#1a7d3f'; x.fillRect(0, i*32, 512, 32); }
  // feine Sprenkel
  for(let i=0;i<6000;i++){ x.fillStyle='rgba(255,255,255,'+(Math.random()*0.04)+')'; x.fillRect(Math.random()*512,Math.random()*512,1,1); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(8,8); t.anisotropy=8; return t;
}
function makeNet(){
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.clearRect(0,0,256,256); x.strokeStyle='rgba(255,255,255,0.55)'; x.lineWidth=2;
  for(let i=0;i<=256;i+=16){ x.beginPath();x.moveTo(i,0);x.lineTo(i,256);x.stroke(); x.beginPath();x.moveTo(0,i);x.lineTo(256,i);x.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function makeBall(){
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#ffffff'; x.fillRect(0,0,256,256);
  x.fillStyle='#0a1024';
  // angedeutete Pentagons
  const pent=(cx,cy,r)=>{x.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;x.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}x.closePath();x.fill();};
  pent(128,80,26); pent(60,170,22); pent(196,170,22); pent(128,210,18);
  x.strokeStyle='rgba(0,0,0,0.12)';x.lineWidth=3;for(let i=0;i<=256;i+=64){x.beginPath();x.moveTo(i,0);x.lineTo(i,256);x.stroke();}
  return new THREE.CanvasTexture(c);
}
function makeCrowd(){
  const c=document.createElement('canvas'); c.width=1024; c.height=256; const x=c.getContext('2d');
  x.fillStyle='#0c1226'; x.fillRect(0,0,1024,256);
  const cols=['#ffce00','#38bdf8','#ffffff','#ff5a7a','#2563eb','#e8eefc','#22c55e'];
  for(let i=0;i<9000;i++){ x.fillStyle=cols[(Math.random()*cols.length)|0]; x.globalAlpha=0.5+Math.random()*0.5;
    x.fillRect(Math.random()*1024, 40+Math.random()*216, 3, 3); }
  x.globalAlpha=1;
  const t=new THREE.CanvasTexture(c); t.wrapS=THREE.RepeatWrapping; t.repeat.set(4,1); return t;
}
function numberTex(txt,color){
  const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
  x.clearRect(0,0,128,128); x.fillStyle=color; x.font="bold 96px 'Bebas Neue',Impact,sans-serif";
  x.textAlign='center'; x.textBaseline='middle'; x.fillText(txt,64,68);
  return new THREE.CanvasTexture(c);
}

/* ===== Stadion / Feld ===== */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(80,80), new THREE.MeshStandardMaterial({map:makeGrass(), roughness:1}));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

// Publikum: Rundum-Rang (voller Zylinder, von innen sichtbar)
const crowd = new THREE.Mesh(
  new THREE.CylinderGeometry(42,42,15,64,1,true),
  new THREE.MeshBasicMaterial({map:makeCrowd(), side:THREE.BackSide, fog:true}));
crowd.position.set(0,7.5,-2); scene.add(crowd);
// Tribünen-Sockel
const wall = new THREE.Mesh(new THREE.CylinderGeometry(42,42,1.4,64,1,true),
  new THREE.MeshStandardMaterial({color:0x1a2742, side:THREE.BackSide}));
wall.position.set(0,0.7,-2); scene.add(wall);

// Feldlinien (flache weiße Quader)
const lineMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0x222222, roughness:0.9});
function lineBox(x,z,w,d){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.02,d),lineMat); m.position.set(x,0.012,z); m.receiveShadow=false; scene.add(m); return m; }
// Torauslinie
lineBox(0,0,40.5,0.12);
// Strafraum (16,5 m): Breite 7,32 + 2·16,5 = 40,32 m -> x ±20,16, Tiefe 16,5 m
lineBox(-20.16,8.25,0.12,16.5); lineBox(20.16,8.25,0.12,16.5); lineBox(0,16.5,40.32,0.12);
// Torraum (5,5 m): Breite 7,32 + 2·5,5 = 18,32 m -> x ±9,16, Tiefe 5,5 m
lineBox(-9.16,2.75,0.12,5.5); lineBox(9.16,2.75,0.12,5.5); lineBox(0,5.5,18.32,0.12);
// Elfmeterpunkt
const spotM=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.02,18),lineMat); spotM.position.set(0,0.013,SPOT_Z); scene.add(spotM);
// Strafstoßbogen
const arc=new THREE.Mesh(new THREE.TorusGeometry(9.15,0.06,8,60,Math.PI*0.62),lineMat);
arc.rotation.x=-Math.PI/2; arc.rotation.z=Math.PI*0.69; arc.position.set(0,0.013,SPOT_Z); scene.add(arc);

/* ===== Tor + Netz ===== */
const goal = new THREE.Group(); scene.add(goal);
const frameMat = new THREE.MeshStandardMaterial({color:0xf3f6ff, roughness:0.5, metalness:0.1, emissive:0x16243f});
function post(x){ const p=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,GH,16),frameMat); p.position.set(x,GH/2,0); p.castShadow=true; goal.add(p); }
post(-HALF); post(HALF);
const bar=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,GW+0.14,16),frameMat); bar.rotation.z=Math.PI/2; bar.position.set(0,GH,0); bar.castShadow=true; goal.add(bar);

const DEPTH=1.9;
// Echtes Tornetz als Maschen-Gitter (LineSegments). Eckpunkte des Netz-Käfigs:
const V = {
  FTL:new THREE.Vector3(-HALF, GH, 0),  FTR:new THREE.Vector3( HALF, GH, 0),     // vorne oben (Latte)
  BTL:new THREE.Vector3(-HALF, 1.95, -DEPTH), BTR:new THREE.Vector3( HALF, 1.95, -DEPTH), // hinten oben (geneigt)
  BBL:new THREE.Vector3(-HALF, 0, -DEPTH), BBR:new THREE.Vector3( HALF, 0, -DEPTH),  // hinten unten
  FBL:new THREE.Vector3(-HALF, 0, 0),   FBR:new THREE.Vector3( HALF, 0, 0)          // vorne unten (Torlinie)
};
const netMaterial = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.42});
function meshFace(a,b,c,d,nu,nv){   // bilineares Gitter a=TL b=TR c=BR d=BL
  const pts=[]; const P=(u,v)=>{ const t1=a.clone().lerp(b,u), t2=d.clone().lerp(c,u); return t1.lerp(t2,v); };
  for(let i=0;i<=nu;i++){ const u=i/nu; for(let v=0;v<nv;v++){ pts.push(P(u,v/nv),P(u,(v+1)/nv)); } }   // vertikale Maschen
  for(let j=0;j<=nv;j++){ const v=j/nv; for(let u=0;u<nu;u++){ pts.push(P(u/nu,v),P((u+1)/nu,v)); } }     // horizontale Maschen
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.LineSegments(g, netMaterial);
}
const netBack = meshFace(V.BTL,V.BTR,V.BBR,V.BBL, 28, 18); goal.add(netBack);   // Rückwand (referenziert für Wackeln)
const netBackBase = netBack.geometry.attributes.position.array.slice();
goal.add(meshFace(V.FTL,V.FTR,V.BTR,V.BTL, 24, 7));    // Dach (geneigt)
goal.add(meshFace(V.FTL,V.BTL,V.BBL,V.FBL, 7, 16));    // linke Seite
goal.add(meshFace(V.FTR,V.BTR,V.BBR,V.FBR, 7, 16));    // rechte Seite
goal.add(meshFace(V.FBL,V.FBR,V.BBR,V.BBL, 24, 7));    // Bodennetz

// Netz-Wackeln am Einschlagpunkt
let rippleT=-1, rippleX=0, rippleY=0;
function startRipple(x,y){ rippleT=performance.now(); rippleX=x; rippleY=y; }
function updateRipple(now){
  if(rippleT<0) return;
  const dt=(now-rippleT)/1000, pos=netBack.geometry.attributes.position, arr=pos.array;
  if(dt>0.8){ arr.set(netBackBase); pos.needsUpdate=true; rippleT=-1; return; }
  for(let i=0;i<arr.length;i+=3){ const bx=netBackBase[i], by=netBackBase[i+1];
    const d2=(bx-rippleX)*(bx-rippleX)+(by-rippleY)*(by-rippleY);
    const amp=0.45*Math.exp(-d2/0.55)*Math.cos(dt*24)*Math.exp(-dt*4.2);
    arr[i+2]=netBackBase[i+2]-amp; }
  pos.needsUpdate=true;
}

// unsichtbare Torebene fürs Zielen
const goalPlane=new THREE.Mesh(new THREE.PlaneGeometry(GW,GH), new THREE.MeshBasicMaterial({visible:false}));
goalPlane.position.set(0,GH/2,0); scene.add(goalPlane);

/* ===== Ball ===== */

/* ===== Torwart ===== */
const keeper=new THREE.Group(); keeper.position.set(0,0,0.35); scene.add(keeper);
let kMat={jersey:new THREE.MeshStandardMaterial({roughness:0.7}), trim:new THREE.MeshStandardMaterial({roughness:0.6}),
         skin:new THREE.MeshStandardMaterial({color:0xf0c9a8,roughness:0.8}), short:new THREE.MeshStandardMaterial({color:0x12203a,roughness:0.9})};
const numMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.32,0.32), new THREE.MeshBasicMaterial({transparent:true}));
let armL, armR;
(function buildKeeper(){
  // Torso (leicht nach vorne geneigt -> wirkt aktiv)
  const torso=new THREE.Mesh(new THREE.CapsuleGeometry(0.27,0.46,8,16),kMat.jersey); torso.position.set(0,1.2,0); torso.rotation.x=-0.1; torso.castShadow=true; keeper.add(torso);
  // Trikotnummer vorne (zum Schützen)
  numMesh.position.set(0,1.24,0.29); keeper.add(numMesh);
  // Kopf + Gesicht (zum Schützen gewandt)
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.18,24,24),kMat.skin); head.position.y=1.72; head.castShadow=true; keeper.add(head);
  const hair=new THREE.Mesh(new THREE.SphereGeometry(0.186,24,24,0,Math.PI*2,0,Math.PI*0.62),new THREE.MeshStandardMaterial({color:0x2a1c12,roughness:1})); hair.position.set(0,1.74,-0.01); keeper.add(hair);
  const eyeMat=new THREE.MeshStandardMaterial({color:0x1a1410});
  for(const s of [-1,1]){ const eye=new THREE.Mesh(new THREE.SphereGeometry(0.022,10,10),eyeMat); eye.position.set(s*0.06,1.74,0.165); keeper.add(eye); }
  // Hüfte/Shorts + Beine (gespreizter Stand)
  const hips=new THREE.Mesh(new THREE.BoxGeometry(0.52,0.28,0.34),kMat.short); hips.position.y=0.84; hips.castShadow=true; keeper.add(hips);
  for(const s of [-1,1]){
    const leg=new THREE.Mesh(new THREE.CapsuleGeometry(0.115,0.6,6,10),kMat.skin); leg.position.set(s*0.2,0.42,0); leg.rotation.z=s*0.12; leg.castShadow=true; keeper.add(leg);
    const sock=new THREE.Mesh(new THREE.CapsuleGeometry(0.12,0.18,4,8),kMat.trim); sock.position.set(s*0.26,0.14,0.02); keeper.add(sock);
  }
  // Arme als Gruppen, die an der Schulter rotieren; Glied hängt lokal nach unten
  armL=new THREE.Group(); armL.position.set(-0.29,1.46,0.02); keeper.add(armL);
  armR=new THREE.Group(); armR.position.set(0.29,1.46,0.02); keeper.add(armR);
  for(const grp of [armL,armR]){
    const sleeve=new THREE.Mesh(new THREE.CapsuleGeometry(0.085,0.26,6,10),kMat.jersey); sleeve.position.y=-0.17; sleeve.castShadow=true; grp.add(sleeve);
    const fore=new THREE.Mesh(new THREE.CapsuleGeometry(0.07,0.26,6,10),kMat.skin); fore.position.y=-0.42; grp.add(fore);
    const glove=new THREE.Mesh(new THREE.SphereGeometry(0.13,16,16),kMat.trim); glove.position.set(0,-0.6,0.04); glove.castShadow=true; grp.add(glove);
  }
})();
function applyKit(){
  kMat.jersey.color.set(KEEPER_C.j); kMat.trim.color.set(KEEPER_C.t);
  numMesh.material.map = numberTex('1', KEEPER_C.u); numMesh.material.needsUpdate=true;
}

/* ===== Schützen-Flagge (Eckfahne neben dem Punkt) ===== */
const shooterFlag=new THREE.Group(); shooterFlag.position.set(1.85,0,SPOT_Z+0.2); shooterFlag.scale.setScalar(0.62); scene.add(shooterFlag);
const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,1.2,8),new THREE.MeshStandardMaterial({color:0xdddddd})); pole.position.y=0.6; shooterFlag.add(pole);
const flagMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.32), new THREE.MeshStandardMaterial({side:THREE.DoubleSide})); flagMesh.position.set(0.27,1.05,0); shooterFlag.add(flagMesh);
function flagTex(country){
  const c=document.createElement('canvas'); c.width=120;c.height=78; const x=c.getContext('2d');
  x.fillStyle=country.j; x.fillRect(0,0,120,78);
  x.fillStyle=country.t; x.fillRect(0,26,120,26);
  x.fillStyle=country.u; x.fillRect(0,52,120,26);
  x.font='40px serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(country.f,60,40);
  return new THREE.CanvasTexture(c);
}
function applyShooter(){ flagMesh.material.map=flagTex(SHOOTER); flagMesh.material.needsUpdate=true; }

/* ===== Sound (Web Audio) ===== */
let actx=null;
function audio(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){actx=null;}} if(actx&&actx.state==='suspended')actx.resume(); return actx; }
function tone(freq,dur,type,vol,delay){ const a=audio(); if(!a)return; const t=a.currentTime+(delay||0); const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(a.destination); g.gain.setValueAtTime(vol||0.2,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur); }
function noise(dur,vol){ const a=audio(); if(!a)return; const n=Math.floor(a.sampleRate*dur); const buf=a.createBuffer(1,n,a.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n); const s=a.createBufferSource(); s.buffer=buf; const g=a.createGain(); g.gain.value=vol||0.2; s.connect(g); g.connect(a.destination); s.start(); }
const sfxKick=()=>{ noise(0.07,0.25); tone(150,0.12,'triangle',0.3); };
const sfxGoal=()=>{ tone(523,0.14,'square',0.16); tone(659,0.14,'square',0.16,0.12); tone(784,0.24,'square',0.18,0.24); };
const sfxSave=()=>{ tone(95,0.18,'sawtooth',0.3); noise(0.12,0.2); };
// Enttäuschtes "Oooooh" der Menge beim Fehlschuss/Halten
function sfxGroan(){ const a=audio(); if(!a)return; const t=a.currentTime, dur=1.3;
  const n=Math.floor(a.sampleRate*dur); const buf=a.createBuffer(1,n,a.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1);
  const src=a.createBufferSource(); src.buffer=buf; const lp=a.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(650,t); lp.frequency.exponentialRampToValueAtTime(170,t+dur);
  const g=a.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.3,t+0.22); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(lp); lp.connect(g); g.connect(a.destination); src.start(t); src.stop(t+dur);
  const o=a.createOscillator(),og=a.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(230,t); o.frequency.exponentialRampToValueAtTime(120,t+dur);
  const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=520;
  og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.13,t+0.26); og.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(f); f.connect(og); og.connect(a.destination); o.start(t); o.stop(t+dur); }
const sfxTick=()=>{ tone(760,0.09,'square',0.16); };
function sfxWhistle(){ const a=audio(); if(!a)return; const t=a.currentTime; const o=a.createOscillator(),g=a.createGain();
  o.type='square'; o.frequency.setValueAtTime(2300,t); const lfo=a.createOscillator(),lg=a.createGain(); lfo.frequency.value=30; lg.gain.value=130; lfo.connect(lg); lg.connect(o.frequency);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.26,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34); o.connect(g); g.connect(a.destination); o.start(t); lfo.start(t); o.stop(t+0.36); lfo.stop(t+0.36); }
function sfxCheer(){ const a=audio(); if(!a)return; const t=a.currentTime,dur=1.8;
  const n=Math.floor(a.sampleRate*dur); const buf=a.createBuffer(1,n,a.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1);
  const src=a.createBufferSource(); src.buffer=buf; const bp=a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=850; bp.Q.value=0.6; const g=a.createGain();
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.36,t+0.22); g.gain.setValueAtTime(0.36,t+1.0); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(bp); bp.connect(g); g.connect(a.destination); src.start(t); src.stop(t+dur);
  [0.04,0.2,0.38].forEach((off,k)=>{ const o=a.createOscillator(),wg=a.createGain(); o.type='square'; o.frequency.setValueAtTime(1750+k*240,t+off); o.frequency.exponentialRampToValueAtTime(2550+k*240,t+off+0.12);
    wg.gain.setValueAtTime(0.0001,t+off); wg.gain.exponentialRampToValueAtTime(0.05,t+off+0.03); wg.gain.exponentialRampToValueAtTime(0.0001,t+off+0.2); o.connect(wg); wg.connect(a.destination); o.start(t+off); o.stop(t+off+0.22); }); }
function unlockAudio(){ const a=audio(); if(!a)return; try{const o=a.createOscillator(),g=a.createGain(); g.gain.value=0.0001; o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.03);}catch(e){} }

/* ===== Spiel-Logik ===== */
let mode='menu';                       // menu | countdown | ready | shooting | result | final
let shots=0, goals=0, best=null;
let tShot=0, tResult=0, tCount=0, countShown=null;
let willSave=false, result='';
const start=new THREE.Vector3(0,BALL_R,SPOT_Z);
let target=new THREE.Vector3(0,1.0,0);   // Zielpunkt in der Torebene
let endPos=new THREE.Vector3();          // tatsächliches Ballende
let keeperDive={x:0,y:0,rot:0};
const raycaster=new THREE.Raycaster(), pointer=new THREE.Vector2();

function zoneOf(p){ const col = p.x < -HALF/3 ? 0 : p.x > HALF/3 ? 2 : 1; const row = p.y > GH*0.55 ? 0 : 1; return row*3+col; }
function diveFor(zone){ const col=zone%3, row=Math.floor(zone/3);
  return { x:(col-1)*2.6, y: row===0 ? 1.7 : 0.5, rot:(col-1)*0.9 }; }

function setHint(t){ $hint.textContent=t; }
function renderBest(){ $best.textContent = best==null ? '–' : best+'/'+MAX_SHOTS; }

function aimFromPointer(ev){
  const r=glCanvas.getBoundingClientRect();
  pointer.x=((ev.clientX-r.left)/r.width)*2-1; pointer.y=-((ev.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hit=raycaster.intersectObject(goalPlane,false);
  if(hit.length){ const p=hit[0].point; return new THREE.Vector3(
    THREE.MathUtils.clamp(p.x,-HALF+0.25,HALF-0.25), THREE.MathUtils.clamp(p.y,0.35,GH-0.2), 0); }
  return null;
}
function shoot(p){
  if(mode!=='ready') return;
  target.copy(p);
  const shotZone=zoneOf(p);
  const keeperZone=(Math.random()<KEEPER_READ)?shotZone:Math.floor(Math.random()*6);
  willSave=(keeperZone===shotZone);
  keeperDive=diveFor(keeperZone);
  endPos.set(p.x, p.y, willSave ? 0.1 : -DEPTH+0.4);   // Tor: ins Netz, sonst an der Linie
  sfxKick();
  mode='shooting'; tShot=performance.now();
}

/* Picker */
const $picker=document.getElementById('picker'), $final=document.getElementById('final');
const $grid=document.getElementById('flagGrid'), $flS=document.getElementById('flS'), $flK=document.getElementById('flK');
const $slotS=document.getElementById('slotS'), $slotK=document.getElementById('slotK'), $startBtn=document.getElementById('startBtn'), $againBtn=document.getElementById('againBtn');
let pickS=idxByName('Deutschland'), pickK=idxByName('Brasilien'), activeSlot='S';
function buildGrid(){
  COUNTRIES.forEach((c,i)=>{ const d=document.createElement('button'); d.type='button'; d.className='flag';
    d.innerHTML='<span class="e">'+c.f+'</span><span class="nm">'+c.n+'</span>'; d.addEventListener('click',()=>choose(i)); $grid.appendChild(d); });
  $slotS.addEventListener('click',()=>{activeSlot='S';renderPicker();});
  $slotK.addEventListener('click',()=>{activeSlot='K';renderPicker();});
  $startBtn.addEventListener('click',()=>{ unlockAudio(); applyPicks(); $picker.classList.add('hidden'); startMatch(); });
  $againBtn.addEventListener('click',()=>{ unlockAudio(); $final.classList.add('hidden'); showPicker(); });
}
function choose(i){ if(activeSlot==='S'){pickS=i;activeSlot='K';} else {pickK=i;activeSlot='S';} renderPicker(); }
function renderPicker(){
  $flS.textContent=COUNTRIES[pickS]?COUNTRIES[pickS].f:'🏳️'; $flK.textContent=COUNTRIES[pickK]?COUNTRIES[pickK].f:'🏳️';
  $slotS.classList.toggle('active',activeSlot==='S'); $slotK.classList.toggle('active',activeSlot==='K');
  Array.from($grid.children).forEach((el,i)=>{ el.classList.toggle('sel-s',i===pickS); el.classList.toggle('sel-k',i===pickK); });
  $startBtn.disabled=(pickS==null||pickK==null);
}
function applyPicks(){ SHOOTER=COUNTRIES[pickS]; KEEPER_C=COUNTRIES[pickK]; applyKit(); applyShooter(); updateMatchup(); }
function updateMatchup(){ $match.textContent=SHOOTER.f+'  vs  '+KEEPER_C.f; document.getElementById('finalTeams').textContent=SHOOTER.f+' vs '+KEEPER_C.f; }
function showPicker(){ mode='menu'; resetBall(); $picker.classList.remove('hidden'); setHint('Wähle Schütze & Torwart'); renderPicker(); }

function ratingText(g){ const p=g/MAX_SHOTS; if(g>=MAX_SHOTS)return 'Perfekt – Elfmeter-Gott'; if(p>=0.8)return 'Weltklasse'; if(p>=0.6)return 'Stark geschossen'; if(p>=0.4)return 'Solide Quote'; if(p>=0.2)return 'Da geht mehr'; if(g>=1)return 'Aufwärmen zählt auch'; return 'Üben, üben, üben'; }

function resetBall(){ ball.position.copy(start); ball.rotation.set(0,0,0); keeper.position.set(0,0,0.35); keeper.rotation.z=0; armL.rotation.z=-0.7; armR.rotation.z=0.7; }
function startMatch(){ goals=0; shots=0; $score.textContent=0; $shots.textContent='0/'+MAX_SHOTS; renderBest(); startCountdown(); }
function startCountdown(){ resetBall(); result=''; mode='countdown'; tCount=performance.now(); countShown=null; setHint('Anpfiff …'); }
function flash(txt,color){ $flash.textContent=txt; $flash.style.color=color; $flash.classList.add('show'); setTimeout(()=>$flash.classList.remove('show'),1100); }

/* ===== Animationsschleife ===== */
const easeOut=p=>1-Math.pow(1-p,3);
function loop(){
  const now=performance.now();
  if(mode==='countdown'){
    const el=now-tCount;
    if(el>=COUNT_MS*3){ countShown=0; sfxWhistle(); setHint('Klick eine Stelle im Tor'); mode='ready'; }
    else { const nn=3-Math.floor(el/COUNT_MS); if(nn!==countShown){ countShown=nn; sfxTick(); flash(String(nn),'#38bdf8'); } }
  } else if(mode==='shooting'){
    const p=Math.min((now-tShot)/SHOT_MS,1), e=easeOut(p);
    ball.position.x=start.x+(endPos.x-start.x)*e;
    ball.position.z=start.z+(endPos.z-start.z)*e;
    ball.position.y=BALL_R+(endPos.y-BALL_R)*e + Math.sin(p*Math.PI)*0.9;   // Bogen
    ball.rotation.x-=0.5; ball.rotation.y-=0.3;
    // Torwart hechtet zur gewählten Ecke
    keeper.position.x = keeperDive.x*e;
    keeper.position.y = keeperDive.y>1.2 ? e*0.35 : 0;
    keeper.rotation.z = -keeperDive.rot*e;     // Körper kippt zur Hechtseite
    if(keeperDive.x<0){ armL.rotation.z=-0.7-e*1.4; armR.rotation.z=0.7-e*0.5; }
    else if(keeperDive.x>0){ armR.rotation.z=0.7+e*1.4; armL.rotation.z=-0.7+e*0.5; }
    else { armL.rotation.z=-0.7-e*0.7; armR.rotation.z=0.7+e*0.7; }
    if(p>=1){ shots++; result=willSave?'HALT':'TOR'; if(!willSave)goals++; $shots.textContent=shots+'/'+MAX_SHOTS; $score.textContent=goals;
      if(willSave){ sfxSave(); sfxGroan(); flash('GEHALTEN!','#ff5a7a'); } else { sfxGoal(); sfxCheer(); flash('TOR!','#38bdf8'); startRipple(target.x,target.y); }
      mode='result'; tResult=now; }
  } else if(mode==='result'){
    if(result==='TOR'){ const pr=Math.min((now-tResult)/700,1); ball.position.y=endPos.y+(BALL_R-endPos.y)*easeOut(pr); ball.rotation.x-=0.12; }
    updateRipple(now);
    if(now-tResult>HOLD_MS){
      if(shots>=MAX_SHOTS){ const nr=(best==null||goals>best); if(nr)best=goals; renderBest();
        document.getElementById('finalScore').textContent=goals+' / '+MAX_SHOTS; document.getElementById('finalRate').textContent=ratingText(goals)+(nr?'  ★ Rekord':''); $final.classList.remove('hidden'); mode='final'; }
      else startCountdown();
    }
  }
  if(mode==='ready'||mode==='countdown'){   // Leerlauf: Torwart wippt / verlagert Gewicht
    keeper.position.x=Math.sin(now/640)*0.06;
    keeper.position.y=Math.abs(Math.sin(now/300))*0.035;
    keeper.rotation.z=Math.sin(now/900)*0.02;
    armL.rotation.z=-0.7+Math.sin(now/470)*0.07;
    armR.rotation.z= 0.7-Math.sin(now/470)*0.07;
  }
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

/* ===== Eingabe ===== */
glCanvas.addEventListener('pointerdown', ev=>{
  if(mode!=='ready') return;
  const p=aimFromPointer(ev); if(p) shoot(p);
});

/* ===== Resize ===== */
function resize(){ const w=stageEl.clientWidth, h=Math.round(w*0.62);
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
new ResizeObserver(resize).observe(stageEl);

/* ===== Init ===== */
buildGrid(); applyPicks(); resetBall(); resize();
$shots.textContent='0/'+MAX_SHOTS; renderBest(); showPicker();
requestAnimationFrame(loop);

window.addEventListener('error', e=>{ setHint('Fehler: '+(e.message||'unbekannt')); });
</script>
