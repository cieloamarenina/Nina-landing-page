<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Elfmeter-Challenge 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1024; --ink-2:#0f1c44; --brand:#2563eb; --brand-deep:#1e3a8a;
    --sky:#38bdf8; --text:#e8eefc; --muted:#93a4cc;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% -10%, #15265e 0%, var(--ink) 55%, #06091a 100%);
    color:var(--text); min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  }
  header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:18px 6px 14px}
  .brand{display:flex;align-items:center;gap:10px}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--sky);box-shadow:0 0 14px var(--sky)}
  .title{font-family:'Bebas Neue',Impact,sans-serif;font-size:34px;letter-spacing:1.5px;line-height:1;color:var(--text)}
  .title b{color:var(--sky);font-weight:400}
  .board{font-family:'Bebas Neue',sans-serif;background:linear-gradient(180deg,var(--brand-deep),#0c1230);
    border:1px solid rgba(56,189,248,.35);border-radius:12px;padding:6px 14px;display:flex;gap:14px;align-items:center;
    box-shadow:0 0 18px rgba(37,99,235,.25), inset 0 0 12px rgba(0,0,0,.4)}
  .board .seg{display:flex;flex-direction:column;align-items:center;line-height:1}
  .board .num{font-size:30px;letter-spacing:1px;color:var(--sky)}
  .board .lbl{font-family:'Inter';font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px}

  .stage{position:relative;width:100%;max-width:760px;border-radius:18px;overflow:hidden;
    border:1px solid rgba(56,189,248,.18);box-shadow:0 24px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.03) inset;
    background:#070d22;line-height:0}
  #gl{display:block;width:100%;height:auto;touch-action:none;-webkit-user-select:none;user-select:none;cursor:crosshair}

  /* Overlay-Text (TOR! / GEHALTEN!) */
  #flash{position:absolute;top:14%;left:0;right:0;text-align:center;pointer-events:none;z-index:4;
    font-family:'Bebas Neue',Impact,sans-serif;font-size:84px;letter-spacing:2px;opacity:0;transition:opacity .15s}
  #flash.show{opacity:1}
  /* Nationen-Label oben in der Szene (Schütze vs Torwart) */
  #nations{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:5;
    font-size:13px;letter-spacing:.4px;color:var(--text);background:rgba(8,14,34,.6);
    border:1px solid rgba(56,189,248,.3);border-radius:999px;padding:4px 14px;white-space:nowrap;pointer-events:none}
  #nations b{font-weight:600}
  /* Schuss-Stil-Umschalter */
  #styleBtn{position:absolute;top:8px;right:8px;z-index:5;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.3px;color:var(--text);background:rgba(8,14,34,.7);border:1px solid rgba(56,189,248,.45);
    border-radius:999px;padding:5px 12px;cursor:pointer;white-space:nowrap}
  #styleBtn:active{transform:scale(.95)}
  #styleBtn.gefuehl{border-color:#ffce00;color:#ffe27a}
  /* Schussfuß-Umschalter */
  #footBtn{position:absolute;top:8px;left:8px;z-index:5;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.3px;color:var(--text);background:rgba(8,14,34,.7);border:1px solid rgba(56,189,248,.45);
    border-radius:999px;padding:5px 12px;cursor:pointer;white-space:nowrap}
  #footBtn:active{transform:scale(.95)}

  /* Power-Leiste */
  #powerwrap{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);z-index:5;
    width:58%;max-width:300px;height:11px;border-radius:7px;overflow:hidden;
    background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.28);box-shadow:0 2px 10px rgba(0,0,0,.5);
    opacity:0;transition:opacity .12s;pointer-events:none}
  #powerwrap.show{opacity:1}
  #powerbar{height:100%;width:0%;border-radius:7px;
    background:linear-gradient(90deg,#38bdf8 0%,#22c55e 38%,#ffce00 68%,#ff5a7a 100%);
    background-size:172px 100%;background-repeat:no-repeat}

  footer{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:14px 6px 22px;gap:12px}
  .hint{font-size:13px;color:var(--muted)}
  .badge{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--sky);
    border:1px solid rgba(56,189,248,.4);padding:4px 10px;border-radius:999px;white-space:nowrap}
  #matchup{font-size:16px;letter-spacing:2px}

  /* ── Länder-Picker ───────────────────────────── */
  #picker,#final{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;padding:22px 14px 12px;
    background:linear-gradient(180deg,rgba(8,14,34,.93),rgba(6,9,26,.97));-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  #picker.hidden,#final.hidden{display:none}
  #picker h2,#final h2{font-family:'Bebas Neue',Impact,sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--sky);text-align:center;line-height:1.25;padding-bottom:2px;margin-bottom:18px}
  .modes{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
  .modebtn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--muted);
    background:rgba(13,18,48,.6);border:1px solid rgba(56,189,248,.3);border-radius:999px;padding:6px 16px;cursor:pointer}
  .modebtn.active{color:#06122e;background:var(--sky);border-color:var(--sky)}
  .slots{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
  .slot{flex:1;max-width:240px;display:flex;align-items:center;justify-content:center;gap:9px;padding:8px 10px;border-radius:12px;
    border:1px solid rgba(56,189,248,.3);background:rgba(13,18,48,.6);cursor:pointer}
  .slot .who{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .slot .fl{font-size:26px;line-height:1}
  .slot.s.active{border-color:#ffce00;box-shadow:0 0 14px rgba(255,206,0,.45)}
  .slot.k.active{border-color:#ff5a7a;box-shadow:0 0 14px rgba(255,90,122,.45)}
  .grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;padding:6px;align-content:start}
  .flag{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:10px;background:rgba(255,255,255,.04);border:2px solid transparent;cursor:pointer}
  .flag:hover{background:rgba(56,189,248,.12)}
  .flag .e{font-size:26px;line-height:1}
  .flag .nm{font-size:8px;letter-spacing:.2px;color:var(--muted);text-align:center;line-height:1.1}
  .flag.sel-s{border-color:#ffce00;background:rgba(255,206,0,.12)}
  .flag.sel-k{border-color:#ff5a7a;background:rgba(255,90,122,.12)}
  .btn{margin-top:10px;align-self:center;font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;letter-spacing:1.5px;
    color:#06122e;background:var(--sky);border:none;border-radius:12px;padding:10px 32px;cursor:pointer;box-shadow:0 6px 20px rgba(56,189,248,.4)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  #final{align-items:center;justify-content:center;text-align:center;gap:6px}
  #final .score{font-family:'Bebas Neue',Impact,sans-serif;font-size:120px;line-height:1;color:var(--sky);text-shadow:0 0 28px rgba(56,189,248,.6)}
  #final .rate{font-family:'Bebas Neue',Impact,sans-serif;font-size:34px;color:var(--text)}
  #final .teams{font-size:22px;letter-spacing:2px;margin-bottom:6px}

  /* ── Musik-Button (Spotify-Embed) ───────────────── */
  #music-btn{position:fixed;left:16px;bottom:16px;z-index:30;width:54px;height:54px;border-radius:50%;
    border:1px solid rgba(56,189,248,.5);background:linear-gradient(180deg,var(--brand),var(--brand-deep));
    color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 22px rgba(37,99,235,.45);transition:transform .15s,filter .15s}
  #music-btn:hover{filter:brightness(1.1)}
  #music-btn:active{transform:scale(0.94)}
  /* Panel bleibt immer im DOM (iframe spielt weiter) – Ausblenden nur per transform/opacity */
  #music-panel{position:fixed;left:16px;bottom:80px;z-index:30;width:300px;max-width:calc(100vw - 32px);
    background:rgba(8,14,34,.97);border:1px solid rgba(56,189,248,.35);border-radius:16px;padding:12px;
    box-shadow:0 18px 48px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:10px;
    transition:opacity .2s ease,transform .2s ease;opacity:0;transform:translateY(14px) scale(.98);pointer-events:none}
  #music-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .music-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted)}
  .music-close{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer}
  .music-close:hover{color:var(--text)}
  #music-panel iframe{border-radius:12px;border:0;width:100%}

  /* ── Mobile (≤560px) ────────────────────────────── */
  @media (max-width:560px){
    body{padding-left:10px;padding-right:10px}
    header{padding:12px 2px 10px}
    .title{font-size:23px;letter-spacing:1px}
    .dot{width:9px;height:9px}
    .board{padding:5px 9px;gap:10px}
    .board .num{font-size:21px}
    .board .lbl{font-size:8px;letter-spacing:1.5px}
    #flash{font-size:52px}
    #picker,#final{padding:18px 10px 10px}
    #picker h2,#final h2{font-size:21px;margin-bottom:16px}
    #final .score{font-size:82px}
    #final .rate{font-size:24px}
    #final .teams{font-size:18px}
    footer{padding:10px 2px 16px}
    #matchup{font-size:13px;letter-spacing:1px}
    #music-btn{width:48px;height:48px;font-size:21px;left:12px;bottom:12px}
    #music-panel{left:12px;bottom:70px}
  }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span><span class="title">Elfmeter<b>·</b>Challenge</span></div>
    <div class="board" aria-label="Spielstand">
      <div class="seg"><span class="num" id="score">0</span><span class="lbl">Tore</span></div>
      <div class="seg"><span class="num" id="shots">0</span><span class="lbl">Schuss</span></div>
      <div class="seg"><span class="num" id="best">–</span><span class="lbl">Best</span></div>
    </div>
  </header>

  <div class="stage" id="stage">
    <canvas id="gl"></canvas>
    <div id="flash"></div>
    <div id="nations"></div>
    <button id="footBtn" title="Schussfuß umschalten">🦶 Rechtsfuß</button>
    <button id="styleBtn" title="Schuss-Stil umschalten">💥 Wucht</button>
    <div id="powerwrap"><div id="powerbar"></div></div>

    <div id="picker">
      <h2>Wähle deine Teams</h2>
      <div class="modes">
        <button type="button" class="modebtn active" id="modeSolo">1 Spieler</button>
        <button type="button" class="modebtn" id="modeDuo">2 Spieler</button>
        <button type="button" class="modebtn" id="modeTurnier">🏆 Turnier</button>
      </div>
      <div class="slots">
        <div class="slot s active" id="slotS"><span class="who">Schütze</span><span class="fl" id="flS">🏳️</span></div>
        <div class="slot k" id="slotK"><span class="who">Torwart</span><span class="fl" id="flK">🏳️</span></div>
      </div>
      <div class="grid" id="flagGrid"></div>
      <button class="btn" id="startBtn" disabled>Anpfiff ⚽</button>
    </div>

    <div id="final" class="hidden">
      <h2>Endstand</h2>
      <div class="teams" id="finalTeams">🇩🇪 vs 🇧🇷</div>
      <div class="score" id="finalScore">0 / 10</div>
      <div class="rate" id="finalRate"></div>
      <button class="btn" id="againBtn">Neues Spiel</button>
    </div>
  </div>

  <footer>
    <span class="hint" id="hint">Wähle Schütze &amp; Torwart</span>
    <span class="badge" id="matchup">🇩🇪 vs 🇧🇷</span>
  </footer>

  <!-- ── Hintergrundmusik: Spotify-Playlist "three nations" ──
       Startet beim Anpfiff (User-Geste umgeht Autoplay-Sperre).
       Playlist tauschen? Nur die ID in MUSIC_PLAYLIST unten ändern. -->
  <button id="music-btn" title="Musik 🎵" aria-label="Musik">🎵</button>
  <div id="music-panel" aria-label="Musik-Player">
    <div class="music-head"><span>🎵 three nations</span><button class="music-close" id="music-close" aria-label="Schließen">×</button></div>
    <div id="music-embed"></div>
  </div>
  <!-- Offizielle Spotify IFrame API: erlaubt programmatisches Play innerhalb einer Geste -->
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  <script>
    const MUSIC_PLAYLIST = '74PsGUvTAvqkWVCCnpsrFV'; // Spotify "three nations"
    let spotifyCtrl=null, wantPlay=false, musicStarted=false;
    window.onSpotifyIframeApiReady = (IFrameAPI) => {
      IFrameAPI.createController(
        document.getElementById('music-embed'),
        { uri:'spotify:playlist:'+MUSIC_PLAYLIST, width:'100%', height:352 },
        (ctrl)=>{ spotifyCtrl=ctrl; if(wantPlay) startMusic(); }
      );
    };
    function startMusic(){
      if(!spotifyCtrl){ wantPlay=true; return; }   // API noch nicht bereit -> beim Ready nachholen
      try{ spotifyCtrl.play(); }catch(e){ try{ spotifyCtrl.resume(); }catch(_){} }
      musicStarted=true;
    }
    (function(){
      const btn=document.getElementById('music-btn'), panel=document.getElementById('music-panel'),
            close=document.getElementById('music-close');
      const setOpen=o=>{ panel.classList.toggle('open',o); btn.textContent=o?'🎶':'🎵'; };
      btn.addEventListener('click',()=>{ const o=!panel.classList.contains('open'); setOpen(o); if(o&&!musicStarted) startMusic(); });
      close.addEventListener('click',()=>setOpen(false));
      // Anpfiff -> Musik starten (Klick ist die nötige User-Geste) + Panel kurz zeigen
      const sb=document.getElementById('startBtn');
      if(sb) sb.addEventListener('click',()=>{ if(!musicStarted) startMusic(); setOpen(true); });
    })();
  </script>

<script type="module">
import * as THREE from 'three';

/* ===== WM-2026-Teams (48): Name, Flagge, Trikot j / Trim t / Nummer u ===== */
const COUNTRIES = [

const GW = 7.32, GH = 2.44, HALF = GW/2, SPOT_Z = 11, BALL_R = 0.18;

const camera = new THREE.PerspectiveCamera(42, 16/10, 0.1, 200);

/* Licht */

/* ===== Texturen (Canvas) ===== */
function makeGrass(){
  const c=document.createElement('canvas'); c.width=c.height=512; const x=c.getContext('2d');
  for(let i=0;i<16;i++){ x.fillStyle = i%2 ? '#1f8a47' : '#1a7d3f'; x.fillRect(0, i*32, 512, 32); }
  // feine Sprenkel
  for(let i=0;i<6000;i++){ x.fillStyle='rgba(255,255,255,'+(Math.random()*0.04)+')'; x.fillRect(Math.random()*512,Math.random()*512,1,1); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(8,8); t.anisotropy=8; return t;
}
function makeNet(){
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.clearRect(0,0,256,256); x.strokeStyle='rgba(255,255,255,0.55)'; x.lineWidth=2;
  for(let i=0;i<=256;i+=16){ x.beginPath();x.moveTo(i,0);x.lineTo(i,256);x.stroke(); x.beginPath();x.moveTo(0,i);x.lineTo(256,i);x.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function makeBall(){
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#ffffff'; x.fillRect(0,0,256,256);
  x.fillStyle='#0a1024';
  // angedeutete Pentagons
  const pent=(cx,cy,r)=>{x.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;x.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}x.closePath();x.fill();};
  pent(128,80,26); pent(60,170,22); pent(196,170,22); pent(128,210,18);
  x.strokeStyle='rgba(0,0,0,0.12)';x.lineWidth=3;for(let i=0;i<=256;i+=64){x.beginPath();x.moveTo(i,0);x.lineTo(i,256);x.stroke();}
  return new THREE.CanvasTexture(c);
}
function makeCrowd(){
  const c=document.createElement('canvas'); c.width=1024; c.height=256; const x=c.getContext('2d');
  x.fillStyle='#0c1226'; x.fillRect(0,0,1024,256);
  const cols=['#ffce00','#38bdf8','#ffffff','#ff5a7a','#2563eb','#e8eefc','#22c55e'];
  for(let i=0;i<9000;i++){ x.fillStyle=cols[(Math.random()*cols.length)|0]; x.globalAlpha=0.5+Math.random()*0.5;
    x.fillRect(Math.random()*1024, 40+Math.random()*216, 3, 3); }
  x.globalAlpha=1;
  const t=new THREE.CanvasTexture(c); t.wrapS=THREE.RepeatWrapping; t.repeat.set(4,1); return t;
}
function numberTex(txt,color){
  const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
  x.clearRect(0,0,128,128); x.fillStyle=color; x.font="bold 96px 'Bebas Neue',Impact,sans-serif";

}

  BTL:new THREE.Vector3(-HALF, 1.95, -DEPTH), BTR:new THREE.Vector3( HALF, 1.95, -DEPTH), // hinten oben (geneigt)
  BBL:new THREE.Vector3(-HALF, 0, -DEPTH), BBR:new THREE.Vector3( HALF, 0, -DEPTH),  // hinten unten

const netMaterial = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.42});
function meshFace(a,b,c,d,nu,nv){   // bilineares Gitter a=TL b=TR c=BR d=BL
  const pts=[]; const P=(u,v)=>{ const t1=a.clone().lerp(b,u), t2=d.clone().lerp(c,u); return t1.lerp(t2,v); };
  for(let i=0;i<=nu;i++){ const u=i/nu; for(let v=0;v<nv;v++){ pts.push(P(u,v/nv),P(u,(v+1)/nv)); } }   // vertikale Maschen
  for(let j=0;j<=nv;j++){ const v=j/nv; for(let u=0;u<nu;u++){ pts.push(P(u/nu,v),P((u+1)/nu,v)); } }     // horizontale Maschen
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.LineSegments(g, netMaterial);
}
const netBack = meshFace(V.BTL,V.BTR,V.BBR,V.BBL, 28, 18); goal.add(netBack);   // Rückwand (referenziert für Wackeln)

goal.add(meshFace(V.FTR,V.BTR,V.BBR,V.FBR, 7, 16));    // rechte Seite

// Netz-Wackeln am Einschlagpunkt
let rippleT=-1, rippleX=0, rippleY=0;
function startRipple(x,y){ rippleT=performance.now(); rippleX=x; rippleY=y; }
function updateRipple(now){
  if(rippleT<0) return;
  const dt=(now-rippleT)/1000, pos=netBack.geometry.attributes.position, arr=pos.array;
  if(dt>0.8){ arr.set(netBackBase); pos.needsUpdate=true; rippleT=-1; return; }
  for(let i=0;i<arr.length;i+=3){ const bx=netBackBase[i], by=netBackBase[i+1];
    const d2=(bx-rippleX)*(bx-rippleX)+(by-rippleY)*(by-rippleY);
    const amp=0.45*Math.exp(-d2/0.55)*Math.cos(dt*24)*Math.exp(-dt*4.2);
    arr[i+2]=netBackBase[i+2]-amp; }
  pos.needsUpdate=true;
}

/* ===== Power & Kurve (Schuss-Mechanik) ===== */

// Ziel-Reticle in der Torebene (gut sichtbar: Ring + Mittelpunkt)

const $pwrwrap=()=>document.getElementById('powerwrap'), $pwrbar=()=>document.getElementById('powerbar');

function zoneOf(p){ const col = p.x < -HALF/3 ? 0 : p.x > HALF/3 ? 2 : 1; const row = p.y > GH*0.55 ? 0 : 1; return row*3+col; }
function diveFor(zone){ const col=zone%3, row=Math.floor(zone/3);
  return { x:(col-1)*2.6, y: row===0 ? 1.7 : 0.5, rot:(col-1)*0.9 }; }

function setHint(t){ $hint.textContent=t; }

function aimFromPointer(ev){
  const r=glCanvas.getBoundingClientRect();
  pointer.x=((ev.clientX-r.left)/r.width)*2-1; pointer.y=-((ev.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hit=raycaster.intersectObject(aimPlane,false);   // große Ebene: auch neben/über dem Tor zielbar
  if(hit.length){ const p=hit[0].point; return new THREE.Vector3(
    THREE.MathUtils.clamp(p.x,-HALF-2.6,HALF+2.6), THREE.MathUtils.clamp(p.y,0.3,GH+1.8), 0); }
  return null;
}
// Liegt der Zielpunkt im Tor-Rahmen?
function isOnTarget(p){ return Math.abs(p.x) < HALF-0.12 && p.y < GH-0.1 && p.y > 0.12; }
function shoot(p, power, curve){
  if(mode!=='ready') return;
  power=(power==null)?0.6:power; curve=curve||0;
  target.copy(p);
  // Schuss-Stil: Wucht = schneller/flacher/härter; Gefühl = mehr Effet & Platzierung
  if(shotStyle==='gefuehl'){ curve*=1.75; power=Math.min(1,power*0.9+0.04); }
  else { curve*=0.55; }
  shotPower=power; curveAmt=curve;
  shotDur = SHOT_MS - power*240 + 120 + (shotStyle==='wucht' ? -90 : 70);   // Wucht schneller
  arcH    = 0.42 + power*0.85 + (shotStyle==='gefuehl' ? 0.15 : -0.05);

  const onTarget = isOnTarget(p);
  const overshoot = onTarget && power>0.86 && p.y>GH-0.55;   // zu viel Power oben -> drüber
  willMiss = !onTarget;                                       // neben/über das Tor gezielt
  willOver = overshoot;
  // Beschriftung: über die Latte = DRÜBER, sonst seitlich = DANEBEN
  if(overshoot) missMsg='DRÜBER!';
  else if(willMiss) missMsg = (p.y>=GH-0.05 && Math.abs(p.x)<HALF) ? 'DRÜBER!' : 'DANEBEN!';
  else missMsg='';

  const shotZone=zoneOf(p);
  const styleBonus = shotStyle==='wucht' ? power*0.06 : Math.abs(curve)*0.10;   // Wucht/Effet überlistet Keeper
  const readChance = Math.max(0.04, KEEPER_READ - power*0.12 - Math.abs(curve)*0.07 - styleBonus);
  const keeperZone=(Math.random()<readChance)?shotZone:Math.floor(Math.random()*6);
  willSave = onTarget && !overshoot && (keeperZone===shotZone);
  keeperDive=diveFor(keeperZone);

  if(willSave){
    // Parade: Ball zum hechtenden Keeper, dann Abpraller nach vorn
    savePt.set(keeperDive.x*0.9, Math.max(0.5, keeperDive.y*0.8+0.3), 0.32);
    const side = keeperDive.x!==0 ? Math.sign(keeperDive.x) : (zoneOf(p)%3===1 ? (p.x>=0?1:-1) : 0);
    reboundPt.set(keeperDive.x*1.6 + side*2.2, 0.2, SPOT_Z+3.2);   // fliegt nach vorn raus
    endPos.copy(reboundPt);
  } else if(willMiss){
    endPos.set(p.x, p.y, -DEPTH+0.2);            // neben/über dem Tor vorbei
  } else if(overshoot){
    endPos.set(p.x, GH+1.5, -DEPTH+0.2);         // über die Latte
  } else {
    endPos.set(p.x, p.y, -DEPTH+0.4);            // Tor: ins Netz
  }
  sfxKick();
  mode='shooting'; tShot=performance.now();
}

/* ===== Animationsschleife ===== */
const easeOut=p=>1-Math.pow(1-p,3);
function loop(){
  const now=performance.now();
  if(mode==='countdown'){
    const el=now-tCount;
    if(el>=COUNT_MS*3){ countShown=0; sfxWhistle(); setHint('Ziehen = zielen · halten = Power · wischen = Effet'); mode='ready'; }
    else { const nn=3-Math.floor(el/COUNT_MS); if(nn!==countShown){ countShown=nn; sfxTick(); flash(String(nn),'#38bdf8'); } }
  } else if(mode==='shooting'){
    const p=Math.min((now-tShot)/shotDur,1), e=easeOut(p);
    if(willSave){
      if(p<0.5){ const q=p/0.5, e2=easeOut(q);   // hin zum Keeper
        ball.position.x=start.x+(savePt.x-start.x)*e2 + curveAmt*Math.sin(q*Math.PI)*0.6;
        ball.position.z=start.z+(savePt.z-start.z)*e2;
        ball.position.y=BALL_R+(savePt.y-BALL_R)*e2 + Math.sin(q*Math.PI)*arcH*0.7;
      } else { const q=(p-0.5)/0.5, e3=easeOut(q);   // Abpraller nach vorn
        ball.position.x=savePt.x+(reboundPt.x-savePt.x)*e3;
        ball.position.z=savePt.z+(reboundPt.z-savePt.z)*e3;
        ball.position.y=savePt.y+(reboundPt.y-savePt.y)*e3 + Math.sin(q*Math.PI)*0.85;
      }
    } else {
      ball.position.x=start.x+(endPos.x-start.x)*e + curveAmt*Math.sin(p*Math.PI);   // Effet/Bananenkurve
      ball.position.z=start.z+(endPos.z-start.z)*e;
      ball.position.y=BALL_R+(endPos.y-BALL_R)*e + Math.sin(p*Math.PI)*arcH;          // Bogen (Power)
    }
    ball.rotation.x-=0.5; ball.rotation.y-=0.3;
    animateShooterKick(p);   // Schütze tritt an & schießt
    // Torwart hechtet zur gewählten Ecke
    keeper.position.x = keeperDive.x*e;
    keeper.position.y = keeperDive.y>1.2 ? e*0.35 : 0;
    keeper.rotation.z = -keeperDive.rot*e;     // Körper kippt zur Hechtseite
    if(keeperDive.x<0){ armL.rotation.z=-0.7-e*1.4; armR.rotation.z=0.7-e*0.5; }
    else if(keeperDive.x>0){ armR.rotation.z=0.7+e*1.4; armL.rotation.z=-0.7+e*0.5; }
    else { armL.rotation.z=-0.7-e*0.7; armR.rotation.z=0.7+e*0.7; }
    if(p>=1){ shots++;
      if(willSave){ result='HALT'; sfxSave(); sfxGroan(); flash('GEHALTEN!','#ff5a7a'); }
      else if(willMiss||willOver){ result='MISS'; sfxGroan(); flash(missMsg||'DANEBEN!','#ffb020'); }
      else { result='TOR'; goals++; sfxGoal(); sfxCheer(); flash('TOR!','#38bdf8'); startRipple(target.x,target.y); }
      $shots.textContent=shots+'/'+shotsTarget; $score.textContent=goals;
      mode='result'; tResult=now; }
  } else if(mode==='result'){
    if(result==='TOR'){ const pr=Math.min((now-tResult)/700,1); ball.position.y=endPos.y+(BALL_R-endPos.y)*easeOut(pr); ball.rotation.x-=0.12; }
    updateRipple(now);
    if(now-tResult>HOLD_MS){
      if(shots>=shotsTarget) endOfRound();
      else startCountdown();
    }
  }
  if(mode==='ready'||mode==='countdown'){   // Leerlauf: Torwart wippt / verlagert Gewicht
    keeper.position.x=Math.sin(now/640)*0.06;
    keeper.position.y=Math.abs(Math.sin(now/300))*0.035;
    keeper.rotation.z=Math.sin(now/900)*0.02;
    armL.rotation.z=-0.7+Math.sin(now/470)*0.07;
    armR.rotation.z= 0.7-Math.sin(now/470)*0.07;
    // Schütze wippt leicht in Bereitschaft
    shooter3D.position.x=SH_IDLE.x+Math.sin(now/560)*0.04;
    shArmL.rotation.z=-0.12+Math.sin(now/500)*0.05;
    shArmR.rotation.z= 0.12-Math.sin(now/500)*0.05;
  }
  if(aiming){   // Power-Leiste füllt/oszilliert, Reticle pulsiert
    const pw=currentPower(); const bar=$pwrbar(); if(bar) bar.style.width=(pw*100)+'%';
    retMat.opacity=0.7+0.3*Math.sin(now/110);
    reticle.scale.setScalar(1+0.12*Math.sin(now/140));
  }
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

/* ===== Eingabe: Ziehen=Zielen, Halten=Power, Loslassen=Schuss, Wischen=Effet ===== */
function showReticle(p){ if(p){ aimTarget.copy(p); reticle.position.set(p.x,p.y,0.06); reticle.visible=true;
  const on=isOnTarget(p); retMat.color.setHex(on?0xffffff:0xff4d4d); retDot.material.color.setHex(on?0xff5a7a:0xff2020); } }
glCanvas.addEventListener('pointerdown', ev=>{
  if(mode!=='ready'||aiming) return;
  aiming=true; tAim=performance.now(); curSamples=[{x:ev.clientX,t:tAim}];
  showReticle(aimFromPointer(ev));
  const w=$pwrwrap(); if(w) w.classList.add('show');
  try{ glCanvas.setPointerCapture(ev.pointerId); }catch(e){}
});
glCanvas.addEventListener('pointermove', ev=>{
  if(!aiming) return;
  showReticle(aimFromPointer(ev));
  curSamples.push({x:ev.clientX,t:performance.now()}); if(curSamples.length>10) curSamples.shift();
});
function endAim(ev){
  if(!aiming) return; aiming=false;
  reticle.visible=false; const w=$pwrwrap(); if(w) w.classList.remove('show');
  const power=currentPower();
  // Effet aus der seitlichen Wisch-Geschwindigkeit am Ende
  let curve=0; const s=curSamples;
  if(s.length>=2){ const a=s[Math.max(0,s.length-4)], b=s[s.length-1]; const dt=Math.max(16,b.t-a.t);
    curve=THREE.MathUtils.clamp((b.x-a.x)/dt*1.2,-1.7,1.7); }
  shoot(aimTarget.clone(), power, curve);
}
glCanvas.addEventListener('pointerup', endAim);
glCanvas.addEventListener('pointercancel', endAim);
// Absicherung: Loslassen/Abbruch auch außerhalb des Canvas -> kein Soft-Lock
window.addEventListener('pointerup', endAim);
window.addEventListener('pointercancel', endAim);

/* ===== Schuss-Stil-Umschalter ===== */
const $styleBtn=document.getElementById('styleBtn');
if($styleBtn) $styleBtn.addEventListener('click',()=>{
  shotStyle = shotStyle==='wucht' ? 'gefuehl' : 'wucht';
  $styleBtn.textContent = shotStyle==='wucht' ? '💥 Wucht' : '🎯 Gefühl';
  $styleBtn.classList.toggle('gefuehl', shotStyle==='gefuehl');
});
const $footBtn=document.getElementById('footBtn');
if($footBtn) $footBtn.addEventListener('click',()=>{
  setFoot(shootFoot==='R' ? 'L' : 'R');
  $footBtn.textContent = shootFoot==='R' ? '🦶 Rechtsfuß' : '🦶 Linksfuß';
});

/* ===== Resize ===== */
function resize(){ const w=stageEl.clientWidth;
  // Auf schmalen Screens etwas höheres Spielfeld, damit Picker & Szene mehr Platz haben
  const ratio = window.innerWidth < 560 ? 0.78 : 0.62;
  const h=Math.round(w*ratio);
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
// Resize in rAF entkoppeln -> verhindert die "ResizeObserver loop"-Warnung
let resizeQueued=false;
new ResizeObserver(()=>{ if(resizeQueued)return; resizeQueued=true; requestAnimationFrame(()=>{ resizeQueued=false; resize(); }); }).observe(stageEl);
window.addEventListener('resize', resize);

/* ===== Init ===== */
buildGrid(); applyPicks(); resetBall(); resize();
$shots.textContent='0/'+MAX_SHOTS; renderBest(); showPicker();
requestAnimationFrame(loop);

window.addEventListener('error', e=>{
  // Harmlose ResizeObserver-Schleifenwarnung nicht als Spielfehler anzeigen
  if(e.message && /ResizeObserver loop/i.test(e.message)) return;
  setHint('Fehler: '+(e.message||'unbekannt'));
});
</script>
